<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="440" viewBox="0 0 1200 440" role="img" aria-labelledby="active-title active-desc">
  <title id="active-title">Active Projects</title>
  <desc id="active-desc">Three editable project cards for radar, home lab, and professional profile work.</desc>
  <defs>
    <clipPath id="activeClip"><rect width="1200" height="440" rx="{{radiusLg}}" ry="{{radiusLg}}"/></clipPath>
    <linearGradient id="activeBg" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="{{bg}}"/>
      <stop offset="0.56" stop-color="{{panel}}"/>
      <stop offset="1" stop-color="{{panel2}}"/>
    </linearGradient>
    <radialGradient id="activeGlow"><stop stop-color="{{accent}}" stop-opacity="0.10"/><stop offset="1" stop-color="{{accent}}" stop-opacity="0"/></radialGradient>
  </defs>

  <g clip-path="url(#activeClip)">
    <rect width="1200" height="440" fill="url(#activeBg)"/>
    <rect x="0.5" y="0.5" width="1199" height="439" rx="{{radiusLg}}" ry="{{radiusLg}}" fill="none" stroke="{{accent}}" stroke-opacity="0.16"/>
    <circle cx="1110" cy="60" r="250" fill="url(#activeGlow)"/>
    <circle cx="80" cy="460" r="190" fill="url(#activeGlow)"/>

    <g font-family="{{fontFamily}}">
      <text x="36" y="54" fill="{{text}}" font-size="24" font-weight="800">Active Projects</text>
      <text x="36" y="78" fill="{{muted}}" font-size="12" font-weight="700" letter-spacing="1.5">tech build focus · agentic native · embedded sys. · bio-sensing</text>

      <g transform="translate(36 96)">
        <rect width="350" height="300" rx="{{radiusMd}}" fill="{{card}}" fill-opacity="0.78" stroke="{{accent}}" stroke-opacity="0.18"/>
        <circle cx="28" cy="30" r="5" fill="{{green}}"><animate attributeName="opacity" values="0.65;1;0.75;0.65" dur="{{slowLoop}}" repeatCount="indefinite"/></circle>
        <text x="46" y="34" fill="{{muted}}" font-size="12" font-weight="700" letter-spacing="1.5">ACTIVE</text>
        <text x="24" y="76" fill="{{text}}" font-size="21" font-weight="760">60 GHz mmWave Radar</text>
        <text x="24" y="108" fill="{{accent2}}" font-size="13.2" font-weight="650">Contactless physiology monitoring</text>
        <g font-family="{{monoFamily}}" font-size="11.5" fill="{{tagText}}">
          <rect x="24" y="134" width="86" height="24" rx="6" fill="{{bg}}" fill-opacity="0.60" stroke="{{accent}}" stroke-opacity="0.25"/><text x="34" y="151">UART parsing</text>
          <rect x="118" y="134" width="138" height="24" rx="6" fill="{{bg}}" fill-opacity="0.60" stroke="{{accent}}" stroke-opacity="0.25"/><text x="128" y="151">VisLog streaming API</text>
          <rect x="24" y="166" width="88" height="24" rx="6" fill="{{bg}}" fill-opacity="0.60" stroke="{{accent}}" stroke-opacity="0.25"/><text x="34" y="183">Sensor fusion</text>
          <rect x="120" y="166" width="154" height="24" rx="6" fill="{{bg}}" fill-opacity="0.60" stroke="{{accent}}" stroke-opacity="0.25"/><text x="130" y="183">Deterministic DSP</text>
          <rect x="24" y="198" width="78" height="24" rx="6" fill="{{bg}}" fill-opacity="0.60" stroke="{{accent}}" stroke-opacity="0.25"/><text x="34" y="215">Secure OTA</text>
          <rect x="110" y="198" width="86" height="24" rx="6" fill="{{bg}}" fill-opacity="0.60" stroke="{{accent}}" stroke-opacity="0.25"/><text x="120" y="215">Zephyr RTOS</text>
          <rect x="204" y="198" width="68" height="24" rx="6" fill="{{bg}}" fill-opacity="0.60" stroke="{{accent}}" stroke-opacity="0.25"/><text x="214" y="215">HIL CI</text>
          <rect x="24" y="230" width="56" height="24" rx="6" fill="{{bg}}" fill-opacity="0.60" stroke="{{accent}}" stroke-opacity="0.25"/><text x="34" y="247">ESP32</text>
          <rect x="88" y="230" width="106" height="24" rx="6" fill="{{bg}}" fill-opacity="0.60" stroke="{{accent}}" stroke-opacity="0.25"/><text x="98" y="247">nRF52840 SoC</text>
          <rect x="202" y="230" width="96" height="24" rx="6" fill="{{bg}}" fill-opacity="0.60" stroke="{{accent}}" stroke-opacity="0.25"/><text x="212" y="247">Captive layer</text>
        </g>
      </g>

      <g transform="translate(425 96)">
        <rect width="350" height="300" rx="{{radiusMd}}" fill="{{card}}" fill-opacity="0.78" stroke="{{accent}}" stroke-opacity="0.18"/>
        <circle cx="28" cy="30" r="5" fill="{{accent}}"><animate attributeName="opacity" values="0.65;1;0.75;0.65" dur="{{slowLoop}}" repeatCount="indefinite"/></circle>
        <text x="46" y="34" fill="{{muted}}" font-size="12" font-weight="700" letter-spacing="1.5">FINALIZED</text>
        <text x="24" y="76" fill="{{text}}" font-size="21" font-weight="760">Home Lab Server</text>
        <text x="24" y="108" fill="{{accent2}}" font-size="13.2" font-weight="650">Local-first storage, backups, services, private AI</text>
        <g font-family="{{monoFamily}}" font-size="11.5" fill="{{tagText}}">
          <rect x="24" y="134" width="86" height="24" rx="6" fill="{{bg}}" fill-opacity="0.60" stroke="{{accent}}" stroke-opacity="0.25"/><text x="34" y="151">Proxmox VE</text>
          <rect x="118" y="134" width="138" height="24" rx="6" fill="{{bg}}" fill-opacity="0.60" stroke="{{accent}}" stroke-opacity="0.25"/><text x="128" y="151">KVM/LXC tenancy</text>
          <rect x="24" y="166" width="70" height="24" rx="6" fill="{{bg}}" fill-opacity="0.60" stroke="{{accent}}" stroke-opacity="0.25"/><text x="34" y="183">ZFS pools</text>
          <rect x="102" y="166" width="82" height="24" rx="6" fill="{{bg}}" fill-opacity="0.60" stroke="{{accent}}" stroke-opacity="0.25"/><text x="112" y="183">Snapshots</text>
          <rect x="192" y="166" width="86" height="24" rx="6" fill="{{bg}}" fill-opacity="0.60" stroke="{{accent}}" stroke-opacity="0.25"/><text x="202" y="183">Replication</text>
          <rect x="24" y="198" width="166" height="24" rx="6" fill="{{bg}}" fill-opacity="0.60" stroke="{{accent}}" stroke-opacity="0.25"/><text x="34" y="215">Self-hosted orchestration</text>
          <rect x="198" y="198" width="122" height="24" rx="6" fill="{{bg}}" fill-opacity="0.60" stroke="{{accent}}" stroke-opacity="0.25"/><text x="208" y="215">Index pipelines</text>
          <rect x="24" y="230" width="108" height="24" rx="6" fill="{{bg}}" fill-opacity="0.60" stroke="{{accent}}" stroke-opacity="0.25"/><text x="34" y="247">Docker Compose</text>
          <rect x="140" y="230" width="126" height="24" rx="6" fill="{{bg}}" fill-opacity="0.60" stroke="{{accent}}" stroke-opacity="0.25"/><text x="150" y="247">ClawCode tools</text>
          <rect x="24" y="262" width="138" height="24" rx="6" fill="{{bg}}" fill-opacity="0.60" stroke="{{accent}}" stroke-opacity="0.25"/><text x="34" y="279">Edge-node cluster</text>
          <rect x="170" y="262" width="76" height="24" rx="6" fill="{{bg}}" fill-opacity="0.60" stroke="{{accent}}" stroke-opacity="0.25"/><text x="180" y="279">ARM64 SBCs</text>
        </g>
      </g>

      <g transform="translate(814 96)">
        <rect width="350" height="300" rx="{{radiusMd}}" fill="{{card}}" fill-opacity="0.78" stroke="{{accent}}" stroke-opacity="0.18"/>
        <circle cx="28" cy="30" r="5" fill="{{green}}"><animate attributeName="opacity" values="0.65;1;0.75;0.65" dur="{{slowLoop}}" repeatCount="indefinite"/></circle>
        <text x="46" y="34" fill="{{muted}}" font-size="12" font-weight="700" letter-spacing="1.5">ACTIVE</text>
        <text x="24" y="76" fill="{{text}}" font-size="21" font-weight="760">Professional Profile</text>
        <text x="24" y="108" fill="{{accent2}}" font-size="13.2" font-weight="650">Recruiter-facing documentation and automation</text>
        <g font-family="{{monoFamily}}" font-size="11.5" fill="{{tagText}}">
          <rect x="24" y="134" width="72" height="24" rx="6" fill="{{bg}}" fill-opacity="0.60" stroke="{{accent}}" stroke-opacity="0.25"/><text x="34" y="151">Astro SSG</text>
          <rect x="104" y="134" width="104" height="24" rx="6" fill="{{bg}}" fill-opacity="0.60" stroke="{{accent}}" stroke-opacity="0.25"/><text x="114" y="151">Semantic DOM</text>
          <rect x="24" y="166" width="130" height="24" rx="6" fill="{{bg}}" fill-opacity="0.60" stroke="{{accent}}" stroke-opacity="0.25"/><text x="34" y="183">Git-driven lifecycle</text>
          <rect x="162" y="166" width="120" height="24" rx="6" fill="{{bg}}" fill-opacity="0.60" stroke="{{accent}}" stroke-opacity="0.25"/><text x="172" y="183">CI/CD deployment</text>
          <rect x="24" y="198" width="92" height="24" rx="6" fill="{{bg}}" fill-opacity="0.60" stroke="{{accent}}" stroke-opacity="0.25"/><text x="34" y="215">Dynamic SVG</text>
          <rect x="124" y="198" width="126" height="24" rx="6" fill="{{bg}}" fill-opacity="0.60" stroke="{{accent}}" stroke-opacity="0.25"/><text x="134" y="215">HTTP cache tuning</text>
          <rect x="24" y="230" width="102" height="24" rx="6" fill="{{bg}}" fill-opacity="0.60" stroke="{{accent}}" stroke-opacity="0.25"/><text x="34" y="247">Telemetry infra</text>
          <rect x="134" y="230" width="130" height="24" rx="6" fill="{{bg}}" fill-opacity="0.60" stroke="{{accent}}" stroke-opacity="0.25"/><text x="144" y="247">Ingestion pipelines</text>
          <rect x="24" y="262" width="110" height="24" rx="6" fill="{{bg}}" fill-opacity="0.60" stroke="{{accent}}" stroke-opacity="0.25"/><text x="34" y="279">Funnel tracking</text>
          <rect x="142" y="262" width="104" height="24" rx="6" fill="{{bg}}" fill-opacity="0.60" stroke="{{accent}}" stroke-opacity="0.25"/><text x="152" y="279">Conversion UX</text>
        </g>
      </g>
    </g>
  </g>
</svg>

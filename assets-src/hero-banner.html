<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #010409; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }

  .hero-banner {
    position: relative;
    width: 1200px;
    max-width: 100%;
    height: 360px;
    overflow: hidden;
    border-radius: 22px;
    background: linear-gradient(135deg, #010409 0%, #06101c 56%, #0d1117 100%);
    border: 1px solid rgba(232, 131, 74, 0.16);
    color: #f5f7fb;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
  }

  canvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    opacity: 0.9;
  }

  .glow-blue {
    position: absolute;
    top: -70px; right: -40px;
    width: 440px; height: 440px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(59,130,246,0.14) 0%, transparent 70%);
    pointer-events: none;
  }
  .glow-coral {
    position: absolute;
    bottom: -90px; left: 20px;
    width: 340px; height: 340px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(232,131,74,0.10) 0%, transparent 70%);
    pointer-events: none;
  }

  .text-shade {
    position: absolute;
    inset: 0 auto 0 0;
    width: 62%;
    background: linear-gradient(90deg, rgba(1,4,9,0.98) 0%, rgba(1,4,9,0.86) 56%, rgba(1,4,9,0) 100%);
    pointer-events: none;
    z-index: 1;
  }

  .hero-copy {
    position: absolute;
    left: 44px;
    top: 44px;
    width: 780px;
    z-index: 2;
  }

  .eyebrow {
    margin: 0 0 18px 0;
    color: #ffb26d;
    font-size: 12px;
    font-weight: 800;
    letter-spacing: 3px;
    white-space: nowrap;
  }

  h1 {
    margin: 0;
    font-size: 52px;
    line-height: 1.04;
    font-weight: 820;
    letter-spacing: -2.2px;
    text-shadow: 0 2px 40px rgba(1,4,9,0.85);
  }

  h1 span, .body span {
    display: block;
    white-space: nowrap;
  }

  .body {
    margin: 28px 0 0 0;
    color: #d3dbea;
    font-size: 18px;
    line-height: 1.58;
    text-shadow: 0 1px 20px rgba(1,4,9,0.9);
  }

  .hero-copy::before {
    content: '';
    position: absolute;
    left: -20px;
    top: 0;
    bottom: 0;
    width: 2px;
    background: linear-gradient(to bottom, transparent, rgba(232,131,74,0.5) 30%, rgba(59,130,246,0.5) 70%, transparent);
    border-radius: 2px;
  }
</style>
</head>
<body>

<div class="hero-banner" data-width="1200" data-height="360">
  <canvas id="net"></canvas>
  <div class="glow-blue"></div>
  <div class="glow-coral"></div>
  <div class="text-shade"></div>

  <div class="hero-copy">
    <p class="eyebrow">BIOMEDICAL ENGINEERING FULL STACK</p>
    <h1>
      <span>Medical sensor systems</span>
      <span>from prototype to study devices.</span>
    </h1>
    <p class="body">
      <span>I like building devices that make health data easier to understand,</span>
      <span>give people better tools, and help care feel less uncertain.</span>
    </p>
  </div>
</div>

<script>
const canvas = document.getElementById('net');
const ctx = canvas.getContext('2d');
const banner = canvas.parentElement;

function resize() {
  canvas.width = banner.offsetWidth;
  canvas.height = banner.offsetHeight;
}
resize();
window.addEventListener('resize', resize);

const COLORS = {
  nodePrimary:  'rgba(59,130,246,',
  nodeAccent:   'rgba(232,131,74,',
  nodeDim:      'rgba(100,140,200,',
  edgePrimary:  'rgba(59,130,246,',
  edgeAccent:   'rgba(232,131,74,',
};

const NODE_COUNT = 38;
const CONNECT_DIST = 180;
const EDGE_FADE_DIST = 140;

class Node {
  constructor(i) {
    this.bx = Math.random();
    this.by = Math.random();
    this.r1  = 30 + Math.random() * 90;
    this.r2  = 15 + Math.random() * 50;
    this.s1  = (Math.random() * 0.0004 + 0.0001) * (Math.random() < 0.5 ? 1 : -1);
    this.s2  = (Math.random() * 0.0007 + 0.0002) * (Math.random() < 0.5 ? 1 : -1);
    this.a1  = Math.random() * Math.PI * 2;
    this.a2  = Math.random() * Math.PI * 2;
    this.dx  = (Math.random() - 0.5) * 0.04;
    this.dy  = (Math.random() - 0.5) * 0.04;
    this.isAccent = (i % 9 === 0);
    this.size = this.isAccent ? 2.5 : (1.2 + Math.random() * 1.6);
    this.pulse = Math.random() * Math.PI * 2;
    this.pulseSpeed = 0.008 + Math.random() * 0.012;
    this.x = 0; this.y = 0;
  }

  update(t) {
    this.a1 += this.s1 * t;
    this.a2 += this.s2 * t;
    this.bx = ((this.bx + this.dx * 0.0005) + 1) % 1;
    this.by = ((this.by + this.dy * 0.0005) + 1) % 1;
    this.pulse += this.pulseSpeed;
    const W = canvas.width, H = canvas.height;
    const xBase = W * (0.52 + this.bx * 0.48);
    const yBase = H * (0.05 + this.by * 0.90);
    this.x = xBase + Math.cos(this.a1) * this.r1 + Math.cos(this.a2) * this.r2;
    this.y = yBase + Math.sin(this.a1) * this.r1 * 0.6 + Math.sin(this.a2) * this.r2 * 0.7;
  }

  draw() {
    const p = 0.7 + 0.3 * Math.sin(this.pulse);
    const col = this.isAccent ? COLORS.nodeAccent : COLORS.nodePrimary;
    const r = this.size * p;
    const g = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, r * 4);
    g.addColorStop(0, col + '0.35)');
    g.addColorStop(1, col + '0)');
    ctx.beginPath();
    ctx.arc(this.x, this.y, r * 4, 0, Math.PI * 2);
    ctx.fillStyle = g;
    ctx.fill();
    ctx.beginPath();
    ctx.arc(this.x, this.y, r, 0, Math.PI * 2);
    ctx.fillStyle = col + (this.isAccent ? '0.9)' : '0.8)');
    ctx.fill();
  }
}

const nodes = Array.from({length: NODE_COUNT}, (_, i) => new Node(i));
let last = performance.now();

function draw(now) {
  const dt = now - last;
  last = now;
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  nodes.forEach(n => n.update(dt));
  for (let i = 0; i < nodes.length; i++) {
    for (let j = i + 1; j < nodes.length; j++) {
      const a = nodes[i], b = nodes[j];
      const dx = a.x - b.x, dy = a.y - b.y;
      const dist = Math.sqrt(dx*dx + dy*dy);
      if (dist > CONNECT_DIST) continue;
      const alpha = Math.pow(1 - dist / CONNECT_DIST, 1.6) * 0.55;
      const isHot = a.isAccent || b.isAccent;
      const col = isHot ? COLORS.edgeAccent : COLORS.edgePrimary;
      const grad = ctx.createLinearGradient(a.x, a.y, b.x, b.y);
      grad.addColorStop(0, col + alpha + ')');
      grad.addColorStop(0.5, col + (alpha * 1.3) + ')');
      grad.addColorStop(1, col + alpha + ')');
      ctx.beginPath();
      ctx.moveTo(a.x, a.y);
      ctx.lineTo(b.x, b.y);
      ctx.strokeStyle = grad;
      ctx.lineWidth = isHot ? 0.8 : 0.5;
      ctx.stroke();
    }
  }
  nodes.forEach(n => n.draw());
  requestAnimationFrame(draw);
}

requestAnimationFrame(draw);
</script>
</body>
</html>

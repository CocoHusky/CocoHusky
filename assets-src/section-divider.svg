<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="36" viewBox="0 0 1200 36" role="img" aria-labelledby="divider-title">
  <title id="divider-title">Animated orange section divider</title>
  <defs>
    <linearGradient id="dividerLine" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="{{accent}}" stop-opacity="0.04"/>
      <stop offset="0.5" stop-color="{{accent2}}" stop-opacity="1"/>
      <stop offset="1" stop-color="{{accent}}" stop-opacity="0.04"/>
    </linearGradient>
    <filter id="orangeBlur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1200" height="36" fill="transparent"/>
  <rect x="64" y="17" width="1072" height="2" rx="1" fill="url(#dividerLine)" filter="url(#softGlow)"/>
  <circle cx="64" cy="18" r="2.2" fill="{{accent}}" filter="url(#orangeBlur)" opacity="0.35">
    <animate attributeName="cx" values="64;600;1136;600;64" dur="{{dividerLoop}}" repeatCount="indefinite"/>
    <animate attributeName="r" values="2.1;4.2;2.1;4.2;2.1" dur="{{dividerLoop}}" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.20;0.95;0.20;0.95;0.20" dur="{{dividerLoop}}" repeatCount="indefinite"/>
  </circle>
</svg>

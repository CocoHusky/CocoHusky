<section class="asset section-divider" data-width="640" data-height="36" data-duration="5.8s">
  <style>
    .section-divider {
      position: relative;
      width: 640px;
      height: 36px;
      box-sizing: border-box;
      overflow: hidden;
      background: transparent;
    }

    .divider-line {
      position: absolute;
      left: 32px;
      right: 32px;
      top: 17px;
      height: 2px;
      border-radius: 999px;
      background: linear-gradient(90deg, rgba(232,131,74,0) 0%, rgba(232,131,74,0.28) 11%, rgba(232,131,74,0.82) 50%, rgba(232,131,74,0.28) 89%, rgba(232,131,74,0) 100%);
      box-shadow: 0 0 12px rgba(232,131,74,0.30);
    }

    .divider-glow {
      position: absolute;
      left: 50%;
      top: 7px;
      width: 220px;
      height: 22px;
      transform: translateX(-50%);
      border-radius: 999px;
      background: radial-gradient(circle, rgba(232,131,74,0.28) 0%, rgba(232,131,74,0.12) 42%, transparent 72%);
      filter: blur(5px);
      animation: divider-pulse 4.8s ease-in-out infinite alternate;
    }

    .divider-dot {
      position: absolute;
      top: 12px;
      left: 32px;
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: #ffb26d;
      box-shadow: 0 0 12px rgba(255,178,109,0.88), 0 0 24px rgba(232,131,74,0.46);
      animation: divider-scan 5.8s ease-in-out infinite alternate;
    }

    @keyframes divider-scan {
      from { transform: translateX(0); opacity: 0.68; }
      50% { opacity: 1; }
      to { transform: translateX(566px); opacity: 0.82; }
    }

    @keyframes divider-pulse {
      from { opacity: 0.40; transform: translateX(-50%) scaleX(0.78); }
      to { opacity: 0.92; transform: translateX(-50%) scaleX(1.04); }
    }
  </style>

  <div class="divider-glow" aria-hidden="true"></div>
  <div class="divider-line" aria-hidden="true"></div>
  <div class="divider-dot" aria-hidden="true"></div>
</section>

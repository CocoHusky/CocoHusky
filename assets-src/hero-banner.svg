<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" role="img" aria-labelledby="hero-title hero-desc">
  <title id="hero-title">Alex Burton — medical sensor systems from prototype to product-ready devices</title>
  <desc id="hero-desc">Animated SVG hero banner for the CocoHusky GitHub profile.</desc>
  <defs>
    <clipPath id="heroClip"><rect width="1200" height="360" rx="{{radiusLg}}" ry="{{radiusLg}}"/></clipPath>
    <linearGradient id="heroBg" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="{{bg}}"/>
      <stop offset="0.58" stop-color="{{panel}}"/>
      <stop offset="1" stop-color="{{panel2}}"/>
    </linearGradient>
    <linearGradient id="textShade" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="{{bg}}" stop-opacity="0.98"/>
      <stop offset="0.58" stop-color="{{bg}}" stop-opacity="0.86"/>
      <stop offset="1" stop-color="{{bg}}" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="accentLine" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="{{accent}}" stop-opacity="0"/>
      <stop offset="0.3" stop-color="{{accent}}" stop-opacity="0.55"/>
      <stop offset="0.7" stop-color="{{blue}}" stop-opacity="0.55"/>
      <stop offset="1" stop-color="{{blue}}" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="blueGlow"><stop stop-color="{{blue}}" stop-opacity="0.15"/><stop offset="1" stop-color="{{blue}}" stop-opacity="0"/></radialGradient>
    <radialGradient id="orangeGlow"><stop stop-color="{{accent}}" stop-opacity="0.11"/><stop offset="1" stop-color="{{accent}}" stop-opacity="0"/></radialGradient>
    <filter id="softNodeGlow" x="-80%" y="-80%" width="260%" height="260%"><feGaussianBlur stdDeviation="4" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>

  <g clip-path="url(#heroClip)">
    <rect width="1200" height="360" fill="url(#heroBg)"/>
    <rect x="0.5" y="0.5" width="1199" height="359" rx="{{radiusLg}}" ry="{{radiusLg}}" fill="none" stroke="{{accent}}" stroke-opacity="0.16"/>
    <circle cx="1115" cy="40" r="240" fill="url(#blueGlow)"/>
    <circle cx="120" cy="400" r="190" fill="url(#orangeGlow)"/>

    <g opacity="0.9">
      <animateTransform attributeName="transform" type="translate" values="-10 8;16 -10;-4 14;-10 8" dur="{{heroLoop}}" repeatCount="indefinite"/>
      <line x1="760" y1="66" x2="910" y2="98" stroke="{{blue}}" stroke-width="0.8" stroke-linecap="round"><animate attributeName="opacity" values="0.18;0.62;0.28;0.18" dur="{{heroLoop}}" repeatCount="indefinite"/></line>
      <line x1="910" y1="98" x2="1088" y2="56" stroke="{{accent}}" stroke-width="0.9" stroke-linecap="round"><animate attributeName="opacity" values="0.22;0.68;0.32;0.22" dur="{{heroLoop}}" repeatCount="indefinite"/></line>
      <line x1="815" y1="178" x2="1012" y2="166" stroke="{{blue}}" stroke-width="0.7" stroke-linecap="round"><animate attributeName="opacity" values="0.16;0.56;0.24;0.16" dur="{{slowLoop}}" repeatCount="indefinite"/></line>
      <line x1="1012" y1="166" x2="1120" y2="252" stroke="{{blue}}" stroke-width="0.7" stroke-linecap="round"><animate attributeName="opacity" values="0.12;0.48;0.26;0.12" dur="{{heroLoop}}" repeatCount="indefinite"/></line>
      <line x1="716" y1="276" x2="910" y2="296" stroke="{{accent}}" stroke-width="0.9" stroke-linecap="round"><animate attributeName="opacity" values="0.18;0.58;0.30;0.18" dur="{{slowLoop}}" repeatCount="indefinite"/></line>
      <line x1="910" y1="296" x2="1060" y2="230" stroke="{{blue}}" stroke-width="0.7" stroke-linecap="round"><animate attributeName="opacity" values="0.12;0.52;0.22;0.12" dur="{{heroLoop}}" repeatCount="indefinite"/></line>
    </g>

    <g opacity="0.84">
      <animateTransform attributeName="transform" type="translate" values="18 -6;-12 12;8 -14;18 -6" dur="{{slowLoop}}" repeatCount="indefinite"/>
      <line x1="670" y1="114" x2="815" y2="178" stroke="{{blue}}" stroke-width="0.6" stroke-linecap="round" opacity="0.28"/>
      <line x1="760" y1="66" x2="815" y2="178" stroke="{{blue}}" stroke-width="0.6" stroke-linecap="round" opacity="0.34"/>
      <line x1="910" y1="98" x2="1012" y2="166" stroke="{{accent}}" stroke-width="0.8" stroke-linecap="round" opacity="0.42"/>
      <line x1="815" y1="178" x2="716" y2="276" stroke="{{blue}}" stroke-width="0.6" stroke-linecap="round" opacity="0.30"/>
      <line x1="1012" y1="166" x2="1060" y2="230" stroke="{{accent}}" stroke-width="0.8" stroke-linecap="round" opacity="0.44"/>
    </g>

    <g filter="url(#softNodeGlow)">
      <circle cx="760" cy="66" r="3" fill="{{blue}}"><animate attributeName="opacity" values="0.55;0.95;0.65;0.55" dur="{{slowLoop}}" repeatCount="indefinite"/></circle>
      <circle cx="910" cy="98" r="2.8" fill="{{accent}}"><animate attributeName="opacity" values="0.65;1;0.72;0.65" dur="{{heroLoop}}" repeatCount="indefinite"/></circle>
      <circle cx="1088" cy="56" r="3.4" fill="{{blue}}"><animate attributeName="opacity" values="0.45;0.88;0.58;0.45" dur="{{slowLoop}}" repeatCount="indefinite"/></circle>
      <circle cx="670" cy="114" r="2.2" fill="{{blue}}" opacity="0.75"/>
      <circle cx="815" cy="178" r="3.2" fill="{{blue}}"/>
      <circle cx="1012" cy="166" r="3.5" fill="{{accent}}"/>
      <circle cx="1120" cy="252" r="2.6" fill="{{blue}}"/>
      <circle cx="716" cy="276" r="3.3" fill="{{accent}}"/>
      <circle cx="910" cy="296" r="2.6" fill="{{blue}}"/>
      <circle cx="1060" cy="230" r="2.4" fill="{{blue}}"/>
    </g>

    <rect width="760" height="360" fill="url(#textShade)"/>
    <rect x="24" y="42" width="2" height="242" rx="1" fill="url(#accentLine)"/>

    <g font-family="{{fontFamily}}">
      <text x="44" y="66" fill="{{accent2}}" font-size="12" font-weight="800" letter-spacing="3">BIOMEDICAL ENGINEERING FULL STACK</text>
      <text x="44" y="128" fill="{{text}}" font-size="58" font-weight="820" letter-spacing="-2.2">Medical sensor systems</text>
      <text x="44" y="190" fill="{{text}}" font-size="58" font-weight="820" letter-spacing="-2.2">from prototype to product-ready devices.</text>
      <text x="44" y="248" fill="{{body}}" font-size="18" font-weight="450">I like building devices that make health data easier to understand,</text>
      <text x="44" y="278" fill="{{body}}" font-size="18" font-weight="450">give people better tools, and help care feel less uncertain.</text>
    </g>
  </g>
</svg>

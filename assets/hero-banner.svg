<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" role="img" aria-labelledby="hero-title hero-desc">
  <title id="hero-title">Alex Burton — medical sensing devices built for real-world use</title>
  <desc id="hero-desc">Biomedical sensor systems engineer focused on wearable and implantable medical sensing devices.</desc>

  <defs>
    <clipPath id="heroClip">
      <rect width="1200" height="360" rx="22" ry="22"/>
    </clipPath>

    <linearGradient id="heroBg" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#010409"/>
      <stop offset="0.58" stop-color="#06101c"/>
      <stop offset="1" stop-color="#0d1117"/>
    </linearGradient>

    <radialGradient id="blueGlow" cx="0.88" cy="0.14" r="0.62">
      <stop stop-color="#3b82f6" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="orangeGlow" cx="0.08" cy="1" r="0.60">
      <stop stop-color="#e8834a" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#e8834a" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="textShade" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#010409" stop-opacity="0.98"/>
      <stop offset="0.58" stop-color="#010409" stop-opacity="0.86"/>
      <stop offset="1" stop-color="#010409" stop-opacity="0"/>
    </linearGradient>

    <linearGradient id="accentLine" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#e8834a" stop-opacity="0"/>
      <stop offset="0.3" stop-color="#e8834a" stop-opacity="0.64"/>
      <stop offset="0.7" stop-color="#e8834a" stop-opacity="0.64"/>
      <stop offset="1" stop-color="#e8834a" stop-opacity="0"/>
    </linearGradient>

    <style><![CDATA[
      .ui-font {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      }

      .eyebrow {
        fill: #ffb26d;
        font-size: 12px;
        font-weight: 800;
        letter-spacing: 3px;
      }

      .hero-title {
        fill: #f5f7fb;
        font-size: 58px;
        font-weight: 820;
        letter-spacing: -2.1px;
      }

      .body-copy {
        fill: #b6c2d4;
        font-size: 16px;
        font-weight: 450;
      }

      .portfolio-button-glow {
        fill: #e8834a;
        opacity: 0.16;
      }

      .portfolio-button {
        fill: #e8834a;
        stroke: rgba(255, 178, 109, 0.42);
        stroke-width: 1;
      }

      .portfolio-button-text {
        fill: #010409;
        font-size: 14px;
        font-weight: 800;
        letter-spacing: 0.2px;
      }

      .network-line {
        stroke: #3b82f6;
        stroke-width: 0.7;
        stroke-linecap: round;
        opacity: 0.32;
      }

      .network-line-warm {
        stroke: #e8834a;
        stroke-width: 0.7;
        stroke-linecap: round;
        opacity: 0.30;
      }

      .node-blue {
        fill: #3b82f6;
        opacity: 0.78;
      }

      .node-orange {
        fill: #e8834a;
        opacity: 0.86;
      }
    ]]></style>
  </defs>

  <g clip-path="url(#heroClip)">
    <rect width="1200" height="360" fill="url(#heroBg)"/>
    <rect width="744" height="360" fill="url(#textShade)"/>
    <circle cx="1115" cy="40" r="240" fill="url(#blueGlow)"/>
    <circle cx="120" cy="400" r="190" fill="url(#orangeGlow)"/>

    <g opacity="0.9">
      <line class="network-line" x1="880" y1="82" x2="1030" y2="46"/>
      <line class="network-line" x1="1030" y1="46" x2="1136" y2="116"/>
      <line class="network-line" x1="880" y1="82" x2="964" y2="204"/>
      <line class="network-line-warm" x1="964" y1="204" x2="1112" y2="268"/>
      <line class="network-line" x1="1136" y1="116" x2="1112" y2="268"/>
      <line class="network-line-warm" x1="842" y1="288" x2="964" y2="204"/>
      <circle class="node-blue" cx="880" cy="82" r="3.2"/>
      <circle class="node-blue" cx="1030" cy="46" r="4.2"/>
      <circle class="node-blue" cx="1136" cy="116" r="3.5"/>
      <circle class="node-orange" cx="964" cy="204" r="4.5"/>
      <circle class="node-orange" cx="1112" cy="268" r="3.7"/>
      <circle class="node-orange" cx="842" cy="288" r="3.0"/>
    </g>

    <rect x="24" y="44" width="2" height="248" rx="1" fill="url(#accentLine)"/>

    <g class="ui-font">
      <text class="eyebrow" x="44" y="52">BIOMEDICAL SENSOR SYSTEMS ENGINEER</text>
      <text class="hero-title" x="44" y="104">Medical sensing devices</text>
      <text class="hero-title" x="44" y="158">built for real-world use.</text>
      <text class="body-copy" x="44" y="238">I turn early sensing concepts into wearable and implantable systems,</text>
      <text class="body-copy" x="44" y="263">bridging hardware, data, validation, and product translation.</text>

      <g aria-label="Portfolio button">
        <rect class="portfolio-button-glow" x="44" y="300" width="132" height="38" rx="19"/>
        <rect class="portfolio-button" x="44" y="296" width="132" height="38" rx="19"/>
        <text class="portfolio-button-text" x="68" y="320">Portfolio →</text>
      </g>
    </g>
  </g>

  <rect x="0.5" y="0.5" width="1199" height="359" rx="22" ry="22" fill="none" stroke="rgba(232,131,74,.16)"/>
</svg>

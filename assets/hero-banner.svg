<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" role="img" aria-labelledby="title">
<title id="title">Medical sensor systems from prototype to product-ready devices.</title>
<foreignObject x="0" y="0" width="1200" height="360">
  <div xmlns="http://www.w3.org/1999/xhtml" style="width:1200px;height:360px;overflow:hidden;">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #010409; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }

  .hero-banner {
    position: relative;
    width: 1200px;
    max-width: 100%;
    height: 360px;
    overflow: hidden;
    border-radius: 22px;
    background: linear-gradient(135deg, #010409 0%, #06101c 56%, #0d1117 100%);
    border: 1px solid rgba(232, 131, 74, 0.16);
    color: #f5f7fb;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
  }

  .net { position: absolute; inset: 0; overflow: hidden; opacity: 0.9; }
  .net i { position: absolute; display: block; pointer-events: none; }
  .node { width: 9px; height: 9px; border-radius: 999px; background: #3b82f6; box-shadow: 0 0 18px rgba(59,130,246,.65); animation: drift 18s ease-in-out infinite alternate; }
  .node:nth-of-type(4n) { background: #e8834a; box-shadow: 0 0 22px rgba(232,131,74,.72); }
  .edge { width: 190px; height: 1px; transform-origin: left center; background: linear-gradient(90deg, rgba(59,130,246,0), rgba(59,130,246,.55), rgba(232,131,74,.32), rgba(59,130,246,0)); animation: pulse-edge 9s ease-in-out infinite alternate; }
  .n1{left:58%;top:19%;animation-delay:-1s}.n2{left:73%;top:13%;animation-delay:-3s}.n3{left:88%;top:28%;animation-delay:-7s}.n4{left:62%;top:52%;animation-delay:-2s}.n5{left:79%;top:58%;animation-delay:-5s}.n6{left:94%;top:67%;animation-delay:-4s}.n7{left:68%;top:82%;animation-delay:-8s}.n8{left:54%;top:72%;animation-delay:-6s}.n9{left:82%;top:40%;animation-delay:-9s}.n10{left:96%;top:11%;animation-delay:-10s}
  .e1{left:58%;top:21%;transform:rotate(-9deg);animation-delay:-2s}.e2{left:70%;top:17%;transform:rotate(31deg);animation-delay:-4s}.e3{left:63%;top:54%;transform:rotate(4deg);animation-delay:-1s}.e4{left:76%;top:59%;transform:rotate(24deg);animation-delay:-6s}.e5{left:58%;top:75%;transform:rotate(-18deg);animation-delay:-5s}
  @keyframes drift { from { transform: translate3d(-18px, 12px, 0) scale(.78); opacity:.56; } 50% { opacity:1; } to { transform: translate3d(26px, -20px, 0) scale(1.35); opacity:.86; } }
  @keyframes pulse-edge { from { opacity:.18; filter:blur(.2px); } to { opacity:.85; filter:blur(0); } }

  .glow-blue {
    position: absolute;
    top: -70px; right: -40px;
    width: 440px; height: 440px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(59,130,246,0.14) 0%, transparent 70%);
    pointer-events: none;
  }

  .glow-coral {
    position: absolute;
    bottom: -90px; left: 20px;
    width: 340px; height: 340px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(232,131,74,0.10) 0%, transparent 70%);
    pointer-events: none;
  }

  .text-shade {
    position: absolute;
    inset: 0 auto 0 0;
    width: 68%;
    background: linear-gradient(90deg, rgba(1,4,9,0.98) 0%, rgba(1,4,9,0.88) 58%, rgba(1,4,9,0) 100%);
    pointer-events: none;
    z-index: 1;
  }

  .hero-copy {
    position: absolute;
    left: 44px;
    top: 42px;
    width: 880px;
    z-index: 2;
  }

  .eyebrow {
    margin: 0 0 16px 0;
    color: #ffb26d;
    font-size: 12px;
    font-weight: 800;
    letter-spacing: 3px;
    white-space: nowrap;
  }

  h1 {
    margin: 0;
    font-size: 62px;
    line-height: 1.02;
    font-weight: 820;
    letter-spacing: -2.4px;
  }

  h1 span, .body span {
    display: block;
    white-space: nowrap;
  }

  .body {
    margin: 22px 0 0 0;
    color: #d3dbea;
    font-size: 18px;
    line-height: 1.58;
    text-shadow: 0 1px 20px rgba(1,4,9,0.9);
  }

  .hero-copy::before {
    content: '';
    position: absolute;
    left: -20px;
    top: 0;
    bottom: 0;
    width: 2px;
    background: linear-gradient(to bottom, transparent, rgba(232,131,74,0.5) 30%, rgba(59,130,246,0.5) 70%, transparent);
    border-radius: 2px;
  }
</style>
<div class="hero-banner" data-width="1200" data-height="360">
  <div class="net" aria-hidden="true">
    <i class="edge e1"></i><i class="edge e2"></i><i class="edge e3"></i><i class="edge e4"></i><i class="edge e5"></i>
    <i class="node n1"></i><i class="node n2"></i><i class="node n3"></i><i class="node n4"></i><i class="node n5"></i><i class="node n6"></i><i class="node n7"></i><i class="node n8"></i><i class="node n9"></i><i class="node n10"></i>
  </div>

  <div class="glow-blue"></div>
  <div class="glow-coral"></div>
  <div class="text-shade"></div>

  <div class="hero-copy">
    <p class="eyebrow">BIOMEDICAL ENGINEERING FULL STACK</p>
    <h1>
      <span>Medical sensor systems</span>
      <span>from prototype to product-ready devices.</span>
    </h1>
    <p class="body">
      <span>I like building devices that make health data easier to understand,</span>
      <span>give people better tools, and help care feel less uncertain.</span>
    </p>
  </div>
</div>
  </div>
</foreignObject>
</svg>

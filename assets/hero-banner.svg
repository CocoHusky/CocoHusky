<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="320" viewBox="0 0 1200 320" role="img">
  <foreignObject x="0" y="0" width="1200" height="320">
    <div xmlns="http://www.w3.org/1999/xhtml">
<div class="asset hero-banner" data-width="1200" data-height="320">
  <style>
    .hero-banner {
      position: relative;
      width: 1200px;
      height: 320px;
      overflow: hidden;
      box-sizing: border-box;
      border-radius: 22px;
      background: radial-gradient(circle at 82% 28%, rgba(76, 141, 255, 0.16), transparent 24%),
                  radial-gradient(circle at 10% 96%, rgba(232, 131, 74, 0.10), transparent 28%),
                  linear-gradient(135deg, #010409 0%, #06101c 56%, #0d1117 100%);
      border: 1px solid rgba(232, 131, 74, 0.16);
      color: #f5f7fb;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    }

    .hero-banner::before {
      content: "";
      position: absolute;
      inset: 0;
      opacity: 0.22;
      background-image: linear-gradient(rgba(111, 211, 255, 0.08) 1px, transparent 1px),
                        linear-gradient(90deg, rgba(111, 211, 255, 0.08) 1px, transparent 1px);
      background-size: 52px 52px;
    }

    .hero-copy {
      position: absolute;
      left: 30px;
      top: 38px;
      width: 700px;
    }

    .eyebrow {
      margin: 0 0 24px 0;
      color: #ffb26d;
      font-size: 13px;
      font-weight: 800;
      letter-spacing: 3px;
    }

    h1 {
      margin: 0;
      font-size: 58px;
      line-height: 1.07;
      font-weight: 820;
      letter-spacing: -2.5px;
    }

    h1 span,
    .body span {
      display: block;
    }

    .body {
      margin: 34px 0 0 0;
      color: #b6c2d4;
      font-size: 19px;
      line-height: 1.58;
    }

    .orbit {
      position: absolute;
      right: 34px;
      top: 30px;
      width: 392px;
      height: 252px;
      border-radius: 50%;
      border: 1.4px solid rgba(76, 141, 255, 0.28);
      transform: rotate(-18deg);
      box-shadow: 0 0 26px rgba(232, 131, 74, 0.16);
    }

    .orbit::before,
    .orbit::after {
      content: "";
      position: absolute;
      inset: 34px 8px;
      border-radius: 50%;
      border: 1px solid rgba(111, 211, 255, 0.22);
      transform: rotate(38deg);
    }

    .orbit::after {
      inset: 74px -10px;
      border-color: rgba(232, 131, 74, 0.32);
      transform: rotate(-56deg);
    }

    .node {
      position: absolute;
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: #e8834a;
      box-shadow: 0 0 14px #e8834a;
    }

    .node.a { right: 292px; top: 100px; }
    .node.b { right: 82px; top: 112px; }
  </style>

  <div class="hero-copy">
    <p class="eyebrow">BIOMEDICAL ENGINEERING FULL STACK</p>
    <h1>
      <span>Medical sensor systems from prototype</span>
      <span>to real-world study devices.</span>
    </h1>
    <p class="body">
      <span>I build the hardware, firmware, data workflows, housings, and validation paths</span>
      <span>that turn miniature sensing ideas into usable wearable and implantable medical systems.</span>
    </p>
  </div>
  <div class="orbit"></div>
  <div class="node a"></div>
  <div class="node b"></div>
</div>
    </div>
  </foreignObject>
</svg>

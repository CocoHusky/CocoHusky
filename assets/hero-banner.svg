<svg xmlns="http://www.w3.org/2000/svg" width="640" height="300" viewBox="0 0 640 300" role="img" aria-labelledby="title">
<title id="title">Medical sensor systems from prototype to product-ready devices.</title>
<foreignObject x="0" y="0" width="640" height="300">
  <div xmlns="http://www.w3.org/1999/xhtml" style="width:640px;height:300px;overflow:hidden;">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #010409; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 0; }

  .hero-banner {
    position: relative;
    width: 640px;
    max-width: 100%;
    height: 300px;
    overflow: hidden;
    border-radius: 18px;
    background: linear-gradient(135deg, #010409 0%, #06101c 58%, #0d1117 100%);
    border: 1px solid rgba(232, 131, 74, 0.18);
    color: #f5f7fb;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
  }

  .net { position: absolute; inset: 0; overflow: hidden; opacity: 0.9; }
  .net i { position: absolute; display: block; pointer-events: none; }
  .node { width: 7px; height: 7px; border-radius: 999px; background: #3b82f6; box-shadow: 0 0 16px rgba(59,130,246,.62); animation: drift 18s ease-in-out infinite alternate; }
  .node:nth-of-type(4n) { background: #e8834a; box-shadow: 0 0 20px rgba(232,131,74,.72); }
  .edge { width: 120px; height: 1px; transform-origin: left center; background: linear-gradient(90deg, rgba(59,130,246,0), rgba(59,130,246,.44), rgba(232,131,74,.34), rgba(59,130,246,0)); animation: pulse-edge 9s ease-in-out infinite alternate; }
  .n1{left:62%;top:18%;animation-delay:-1s}.n2{left:78%;top:14%;animation-delay:-3s}.n3{left:92%;top:28%;animation-delay:-7s}.n4{left:66%;top:54%;animation-delay:-2s}.n5{left:82%;top:58%;animation-delay:-5s}.n6{left:96%;top:68%;animation-delay:-4s}.n7{left:72%;top:84%;animation-delay:-8s}.n8{left:58%;top:72%;animation-delay:-6s}.n9{left:86%;top:42%;animation-delay:-9s}.n10{left:98%;top:12%;animation-delay:-10s}
  .e1{left:62%;top:20%;transform:rotate(-9deg);animation-delay:-2s}.e2{left:76%;top:18%;transform:rotate(31deg);animation-delay:-4s}.e3{left:66%;top:55%;transform:rotate(4deg);animation-delay:-1s}.e4{left:80%;top:60%;transform:rotate(24deg);animation-delay:-6s}.e5{left:60%;top:76%;transform:rotate(-18deg);animation-delay:-5s}
  @keyframes drift { from { transform: translate3d(-10px, 8px, 0) scale(.78); opacity:.56; } 50% { opacity:1; } to { transform: translate3d(18px, -14px, 0) scale(1.28); opacity:.86; } }
  @keyframes pulse-edge { from { opacity:.18; filter:blur(.2px); } to { opacity:.76; filter:blur(0); } }

  .glow-blue {
    position: absolute;
    top: -80px; right: -90px;
    width: 300px; height: 300px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(59,130,246,0.13) 0%, transparent 70%);
    pointer-events: none;
  }

  .glow-coral {
    position: absolute;
    bottom: -110px; left: -40px;
    width: 280px; height: 280px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(232,131,74,0.12) 0%, transparent 70%);
    pointer-events: none;
  }

  .text-shade {
    position: absolute;
    inset: 0 auto 0 0;
    width: 84%;
    background: linear-gradient(90deg, rgba(1,4,9,0.99) 0%, rgba(1,4,9,0.92) 60%, rgba(1,4,9,0) 100%);
    pointer-events: none;
    z-index: 1;
  }

  .hero-copy {
    position: absolute;
    left: 36px;
    right: 30px;
    top: 30px;
    z-index: 2;
  }

  .eyebrow {
    margin: 0 0 13px 0;
    color: #ffb26d;
    font-size: 10px;
    font-weight: 800;
    letter-spacing: 2.7px;
    white-space: nowrap;
  }

  h1 {
    margin: 0;
    max-width: 540px;
    font-size: 38px;
    line-height: 1.06;
    font-weight: 820;
    letter-spacing: -1.45px;
  }

  h1 span, .body span {
    display: block;
    white-space: nowrap;
  }

  .body {
    margin: 18px 0 0 0;
    max-width: 500px;
    color: #d3dbea;
    font-size: 14.5px;
    line-height: 1.48;
    text-shadow: 0 1px 18px rgba(1,4,9,0.9);
  }

  .hero-copy::before {
    content: '';
    position: absolute;
    left: -16px;
    top: 1px;
    bottom: 2px;
    width: 2px;
    background: linear-gradient(to bottom, transparent, rgba(232,131,74,0.58) 28%, rgba(59,130,246,0.45) 72%, transparent);
    border-radius: 2px;
  }
</style>
<div class="hero-banner" data-width="640" data-height="300">
  <div class="net" aria-hidden="true">
    <i class="edge e1"></i><i class="edge e2"></i><i class="edge e3"></i><i class="edge e4"></i><i class="edge e5"></i>
    <i class="node n1"></i><i class="node n2"></i><i class="node n3"></i><i class="node n4"></i><i class="node n5"></i><i class="node n6"></i><i class="node n7"></i><i class="node n8"></i><i class="node n9"></i><i class="node n10"></i>
  </div>

  <div class="glow-blue"></div>
  <div class="glow-coral"></div>
  <div class="text-shade"></div>

  <div class="hero-copy">
    <p class="eyebrow">BIOMEDICAL ENGINEERING FULL STACK</p>
    <h1>
      <span>Medical sensor systems</span>
      <span>from prototype</span>
      <span>to product-ready devices.</span>
    </h1>
    <p class="body">
      <span>Building devices that make health data easier to understand,</span>
      <span>and help useful tools move beyond the lab.</span>
    </p>
  </div>
</div>
  </div>
</foreignObject>
</svg>

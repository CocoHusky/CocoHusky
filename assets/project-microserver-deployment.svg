<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="300" viewBox="0 0 1200 300" role="img" aria-labelledby="server-title server-desc">
  <title id="server-title">Micro-Server Deployment</title>
  <desc id="server-desc">A complete local-first server build for private storage, backups, and self-hosted AI workflows.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#010409"/>
      <stop offset="0.58" stop-color="#06101c"/>
      <stop offset="1" stop-color="#0d1117"/>
    </linearGradient>

    <radialGradient id="blueGlow" cx="0.92" cy="0.16" r="0.72">
      <stop stop-color="#3b82f6" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="orangeGlow" cx="0.08" cy="0.92" r="0.72">
      <stop stop-color="#e8834a" stop-opacity="0.20"/>
      <stop offset="1" stop-color="#e8834a" stop-opacity="0"/>
    </radialGradient>

    <style><![CDATA[
      .ui { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; }
      .mono { font-family: ui-monospace, "SF Mono", Menlo, Monaco, Consolas, monospace; }
      .title { fill:#f5f7fb; font-size:38px; font-weight:820; letter-spacing:-0.9px; }
      .copy { fill:#b6c2d4; font-size:17px; font-weight:450; }
      .stack { fill:#ffb26d; font-size:13px; font-weight:650; letter-spacing:0.2px; }
      .complete { fill:#f59e0b; }
      .status { fill:#9aa7bc; font-size:11px; font-weight:800; letter-spacing:1.6px; }
    ]]></style>
  </defs>

  <rect width="1200" height="300" rx="22" fill="url(#bg)"/>
  <circle cx="1090" cy="42" r="210" fill="url(#blueGlow)"/>
  <circle cx="98" cy="312" r="180" fill="url(#orangeGlow)"/>
  <rect x="0.5" y="0.5" width="1199" height="299" rx="22" fill="none" stroke="rgba(232,131,74,0.18)"/>

  <g class="ui">
    <circle class="complete" cx="62" cy="54" r="5"/>
    <text class="mono status" x="76" y="58">COMPLETE</text>

    <text class="title" x="62" y="126">Micro-Server Deployment</text>

    <text class="copy" x="62" y="172">A local-first server build for private storage, backups, and self-hosted AI workflows.</text>
    <text class="copy" x="62" y="200">The setup keeps personal files on the home network while still supporting</text>
    <text class="copy" x="62" y="228">monitoring, service organization, and maintainable infrastructure.</text>
    <text class="copy" x="62" y="256">It is written as a practical deployment guide for small teams, families, and homelabs.</text>

    <text class="mono stack" x="62" y="278">Proxmox VE · KVM/LXC · TrueNAS · ZFS · Backups · WireGuard · DNS · Service routing</text>
  </g>
</svg>

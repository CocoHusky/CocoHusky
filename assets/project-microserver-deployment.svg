<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="340" viewBox="0 0 1200 340" role="img" aria-labelledby="server-title server-desc">
  <title id="server-title">Local AI Knowledge Server</title>
  <desc id="server-desc">A local-first AI, storage, backup, and document retrieval system for private files and searchable context.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#010409"/>
      <stop offset="0.58" stop-color="#06101c"/>
      <stop offset="1" stop-color="#0d1117"/>
    </linearGradient>

    <radialGradient id="blueGlow" cx="0.92" cy="0.16" r="0.72">
      <stop stop-color="#3b82f6" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="orangeGlow" cx="0.08" cy="0.92" r="0.72">
      <stop stop-color="#e8834a" stop-opacity="0.20"/>
      <stop offset="1" stop-color="#e8834a" stop-opacity="0"/>
    </radialGradient>

    <style><![CDATA[
      .ui { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; }
      .mono { font-family: ui-monospace, "SF Mono", Menlo, Monaco, Consolas, monospace; }
      .title { fill:#f5f7fb; font-size:58px; font-weight:820; letter-spacing:-1.6px; }
      .copy { fill:#b6c2d4; font-size:19px; font-weight:460; }
      .stack { fill:#ffb26d; font-size:15px; font-weight:700; letter-spacing:0.1px; }
      .complete { fill:#f59e0b; }
      .status { fill:#9aa7bc; font-size:13px; font-weight:800; letter-spacing:1.8px; }
    ]]></style>
  </defs>

  <rect width="1200" height="340" rx="22" fill="url(#bg)"/>
  <circle cx="1090" cy="42" r="210" fill="url(#blueGlow)"/>
  <circle cx="98" cy="352" r="180" fill="url(#orangeGlow)"/>
  <rect x="0.5" y="0.5" width="1199" height="339" rx="22" fill="none" stroke="rgba(232,131,74,0.18)"/>

  <g class="ui">
    <circle class="complete" cx="62" cy="56" r="5.5"/>
    <text class="mono status" x="76" y="61">COMPLETE</text>

    <text class="title" x="62" y="126">Local AI Knowledge Server</text>

    <text class="copy" x="62" y="170">Local AI Knowledge Server is a local-first compute, storage, backup, and document retrieval system.</text>
    <text class="copy" x="62" y="202">I built it so documents, images, OCR text, and notes can become searchable context for AI workflows.</text>
    <text class="copy" x="62" y="234">It runs local AI services, SQL metadata, full-text search, OCR indexing, and uptime checks</text>
    <text class="copy" x="62" y="266">so information can be found and reused quickly.</text>

    <text class="mono stack" x="62" y="312">Local AI · Storage · Backups · OCR · SQL metadata · Full-text search · Uptime monitoring</text>
  </g>
</svg>

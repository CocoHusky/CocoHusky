<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="36" viewBox="0 0 1200 36" role="img" aria-label="Animated orange section divider">
  <defs>
    <linearGradient id="divider-line" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#e8834a" stop-opacity="0.04"/>
      <stop offset="0.5" stop-color="#ffb26d" stop-opacity="1"/>
      <stop offset="1" stop-color="#e8834a" stop-opacity="0.04"/>
    </linearGradient>

    <filter id="orange-blur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="soft-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <style><![CDATA[
      .divider-track {
        fill: url(#divider-line);
        filter: url(#soft-glow);
      }

      .divider-orb {
        fill: #e8834a;
        filter: url(#orange-blur);
      }
    ]]></style>
  </defs>

  <rect width="1200" height="36" fill="transparent"/>
  <rect class="divider-track" x="64" y="17" width="1072" height="2" rx="1"/>
  <circle class="divider-orb" cx="64" cy="18" r="2.2" opacity="0.35">
    <animate attributeName="cx" values="64;600;1136;600;64" dur="22s" repeatCount="indefinite"/>
    <animate attributeName="r" values="2.1;4.2;2.1;4.2;2.1" dur="22s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.20;0.95;0.20;0.95;0.20" dur="22s" repeatCount="indefinite"/>
  </circle>
</svg>

<svg width="1200" height="320" viewBox="0 0 1200 320" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Minimal biomedical systems banner</title>
  <desc id="desc">Dark portfolio-style abstract banner with grid, torus rings, signal traces, and two minimal glass panels.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="320" gradientUnits="userSpaceOnUse">
      <stop stop-color="#010813"/>
      <stop offset="0.55" stop-color="#06101C"/>
      <stop offset="1" stop-color="#071321"/>
    </linearGradient>
    <linearGradient id="cyan" x1="120" y1="88" x2="1010" y2="260" gradientUnits="userSpaceOnUse">
      <stop stop-color="#4A90E2"/>
      <stop offset="0.48" stop-color="#5BD5F5"/>
      <stop offset="1" stop-color="#3DD6C8"/>
    </linearGradient>
    <linearGradient id="warm" x1="760" y1="92" x2="1080" y2="242" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F2C166"/>
      <stop offset="1" stop-color="#E8834A"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#0B1727" stop-opacity="0.92"/>
      <stop offset="1" stop-color="#08111F" stop-opacity="0.72"/>
    </linearGradient>
    <radialGradient id="softBlue" cx="50%" cy="50%" r="50%">
      <stop stop-color="#5BD5F5" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#5BD5F5" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="52" height="52" patternUnits="userSpaceOnUse">
      <path d="M52 0H0V52" stroke="#263B55" stroke-opacity="0.24" stroke-width="1"/>
    </pattern>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.35 0 0 0 0 0.84 0 0 0 0 1 0 0 0 .34 0"/>
      <feBlend in="SourceGraphic"/>
    </filter>
  </defs>

  <rect width="1200" height="320" rx="30" fill="url(#bg)"/>
  <rect width="1200" height="320" rx="30" fill="url(#grid)"/>
  <rect x="1" y="1" width="1198" height="318" rx="29" stroke="#1C2B40" stroke-width="2"/>

  <circle cx="715" cy="162" r="184" fill="url(#softBlue)"/>
  <circle cx="790" cy="160" r="168" stroke="#18304A" stroke-opacity="0.55"/>
  <circle cx="790" cy="160" r="104" stroke="#274E78" stroke-opacity="0.38"/>
  <circle cx="790" cy="160" r="58" stroke="#5BD5F5" stroke-opacity="0.20"/>
  <ellipse cx="790" cy="160" rx="236" ry="72" stroke="#2A6EA3" stroke-opacity="0.20"/>
  <ellipse cx="790" cy="160" rx="72" ry="236" stroke="#2A6EA3" stroke-opacity="0.14" transform="rotate(65 790 160)"/>

  <path d="M0 204C104 170 170 170 248 202C340 240 414 247 506 208C620 160 672 108 780 130C898 154 948 228 1200 154" stroke="url(#cyan)" stroke-width="3" stroke-linecap="round" opacity="0.88" filter="url(#glow)"/>
  <path d="M0 238C126 206 192 224 286 248C382 272 466 254 558 214C652 174 746 165 842 190C960 222 1014 246 1200 202" stroke="url(#warm)" stroke-width="2" stroke-linecap="round" opacity="0.52"/>

  <g opacity="0.46">
    <circle cx="72" cy="74" r="2.5" fill="#5BD5F5"/>
    <circle cx="188" cy="270" r="2" fill="#E8834A"/>
    <circle cx="345" cy="54" r="2" fill="#5BD5F5"/>
    <circle cx="505" cy="278" r="2.5" fill="#5BD5F5"/>
    <circle cx="648" cy="84" r="2" fill="#E8834A"/>
    <circle cx="920" cy="56" r="2.5" fill="#5BD5F5"/>
    <circle cx="1108" cy="250" r="2" fill="#E8834A"/>
  </g>

  <g transform="translate(760 62)">
    <rect width="340" height="96" rx="18" fill="url(#panel)" stroke="#24384F"/>
    <circle cx="28" cy="28" r="5" fill="#4A90E2"/>
    <circle cx="48" cy="28" r="5" fill="#5BD5F5"/>
    <circle cx="68" cy="28" r="5" fill="#E8834A"/>
    <text x="28" y="62" fill="#9FB0C8" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="800" letter-spacing="3">FOCUS</text>
    <text x="28" y="84" fill="#F4F7FB" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="850">Miniature medical devices</text>
  </g>

  <g transform="translate(760 180)">
    <rect width="340" height="78" rx="18" fill="url(#panel)" stroke="#24384F"/>
    <text x="28" y="34" fill="#9FB0C8" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="800" letter-spacing="3">SYSTEMS ENGINEERING</text>
    <text x="28" y="60" fill="#F2C166" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="900">R&amp;D → clinical use</text>
  </g>

  <g transform="translate(156 92)" opacity="0.82">
    <rect x="0" y="0" width="156" height="62" rx="18" fill="#071321" fill-opacity="0.34" stroke="#20354F"/>
    <path d="M24 36H54L62 22L76 48L88 31H132" stroke="#5BD5F5" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>

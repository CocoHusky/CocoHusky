<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="300" viewBox="0 0 1200 300" role="img" aria-labelledby="portal-title portal-desc">
  <title id="portal-title">Local Device Portal</title>
  <desc id="portal-desc">A complete browser-based setup portal for Wi-Fi devices that avoids apps, accounts, and cloud setup flows.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#010409"/>
      <stop offset="0.58" stop-color="#06101c"/>
      <stop offset="1" stop-color="#0d1117"/>
    </linearGradient>

    <radialGradient id="blueGlow" cx="0.92" cy="0.16" r="0.72">
      <stop stop-color="#3b82f6" stop-opacity="0.14"/>
      <stop offset="1" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="orangeGlow" cx="0.08" cy="0.92" r="0.72">
      <stop stop-color="#e8834a" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#e8834a" stop-opacity="0"/>
    </radialGradient>

    <style><![CDATA[
      .ui { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; }
      .mono { font-family: ui-monospace, "SF Mono", Menlo, Monaco, Consolas, monospace; }
      .title { fill:#f5f7fb; font-size:58px; font-weight:820; letter-spacing:-1.6px; }
      .copy { fill:#b6c2d4; font-size:20px; font-weight:460; }
      .stack { fill:#ffb26d; font-size:16px; font-weight:700; letter-spacing:0.15px; }
      .complete { fill:#f59e0b; }
      .status { fill:#9aa7bc; font-size:13px; font-weight:800; letter-spacing:1.8px; }
    ]]></style>
  </defs>

  <rect width="1200" height="300" rx="22" fill="url(#bg)"/>
  <circle cx="1090" cy="42" r="210" fill="url(#blueGlow)"/>
  <circle cx="98" cy="312" r="180" fill="url(#orangeGlow)"/>
  <rect x="0.5" y="0.5" width="1199" height="299" rx="22" fill="none" stroke="rgba(232,131,74,0.18)"/>

  <g class="ui">
    <circle class="complete" cx="62" cy="54" r="5.5"/>
    <text class="mono status" x="76" y="59">COMPLETE</text>

    <text class="title" x="62" y="132">Local Device Portal</text>

    <text class="copy" x="62" y="182">A browser-based setup portal for Wi-Fi devices that avoids apps, accounts, and cloud-first setup flows.</text>
    <text class="copy" x="62" y="214">The device creates a local setup network, lets the user choose Wi-Fi, then exposes a dashboard through a local address.</text>
    <text class="copy" x="62" y="246">It is meant to make connected hardware feel usable without requiring an extra download.</text>

    <text class="mono stack" x="62" y="278">ESP32 · Captive portal · Wi-Fi provisioning · mDNS · Local dashboard · App-less setup</text>
  </g>
</svg>

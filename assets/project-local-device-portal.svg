<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="340" viewBox="0 0 1200 340" role="img" aria-labelledby="portal-title portal-desc">
  <title id="portal-title">Local Device Portal</title>
  <desc id="portal-desc">A browser-based embedded device portal for secure setup, direct sensor access, and app-less connected-device workflows.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#010409"/>
      <stop offset="0.58" stop-color="#06101c"/>
      <stop offset="1" stop-color="#0d1117"/>
    </linearGradient>

    <radialGradient id="blueGlow" cx="0.92" cy="0.16" r="0.72">
      <stop stop-color="#3b82f6" stop-opacity="0.14"/>
      <stop offset="1" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="orangeGlow" cx="0.08" cy="0.92" r="0.72">
      <stop stop-color="#e8834a" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#e8834a" stop-opacity="0"/>
    </radialGradient>

    <style><![CDATA[
      .ui { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; }
      .mono { font-family: ui-monospace, "SF Mono", Menlo, Monaco, Consolas, monospace; }
      .title { fill:#f5f7fb; font-size:58px; font-weight:820; letter-spacing:-1.6px; }
      .label { fill:#ffb26d; font-size:13px; font-weight:850; letter-spacing:1.4px; }
      .copy { fill:#b6c2d4; font-size:19px; font-weight:460; }
      .stack { fill:#ffb26d; font-size:15px; font-weight:700; letter-spacing:0.1px; }
      .complete { fill:#f59e0b; }
      .status { fill:#9aa7bc; font-size:13px; font-weight:800; letter-spacing:1.8px; }
    ]]></style>
  </defs>

  <rect width="1200" height="340" rx="22" fill="url(#bg)"/>
  <circle cx="1090" cy="42" r="210" fill="url(#blueGlow)"/>
  <circle cx="98" cy="352" r="180" fill="url(#orangeGlow)"/>
  <rect x="0.5" y="0.5" width="1199" height="339" rx="22" fill="none" stroke="rgba(232,131,74,0.18)"/>

  <g class="ui">
    <circle class="complete" cx="62" cy="56" r="5.5"/>
    <text class="mono status" x="76" y="61">COMPLETE</text>

    <text class="title" x="62" y="126">Local Device Portal</text>

    <text class="label" x="62" y="164">WHAT IT IS</text>
    <text class="copy" x="198" y="164">A browser-based portal that lets embedded devices handle first-run setup without a separate app or account system.</text>

    <text class="label" x="62" y="212">WHY BUILD IT</text>
    <text class="copy" x="198" y="212">To make connected sensors easier to deploy while keeping setup local, direct, and fast for users and developers.</text>

    <text class="label" x="62" y="260">WHAT IT DOES NOW</text>
    <text class="copy" x="244" y="260">Provides device setup screens, local dashboards, and direct access to embedded sensor data through the browser.</text>

    <text class="mono stack" x="62" y="312">ESP32 · Captive portal · Wi-Fi provisioning · mDNS · Browser dashboard · App-less setup</text>
  </g>
</svg>

    <text x="56" y="92" class="eyebrow">BIOMEDICAL ENGINEERING FULL STACK</text>
    <text x="56" y="165" class="title"><tspan x="56">Medical sensor systems from prototype</tspan><tspan x="56" dy="62">to real-world study devices.</tspan></text>
    <text x="56" y="305" class="body"><tspan x="56">I build the hardware, firmware, data workflows, housings, and validation paths</tspan><tspan x="56" dy="30">that turn miniature sensing ideas into usable wearable and implantable medical</tspan></text>

<?xml version="1.0" encoding="UTF-8"?>
<svg id="profile-card" xmlns="http://www.w3.org/2000/svg" width="1200" height="300" viewBox="0 0 1200 300" role="img" aria-label="Alex Burton profile README banner">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#010813"/>
      <stop offset="56%" stop-color="#06101c"/>
      <stop offset="100%" stop-color="#071321"/>
    </linearGradient>

    <pattern id="grid" width="52" height="52" patternUnits="userSpaceOnUse">
      <path d="M52 0H0V52" fill="none" stroke="#5bd5f5" stroke-opacity="0.09" stroke-width="1"/>
    </pattern>

    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0c1a2c" stop-opacity="0.92"/>
      <stop offset="100%" stop-color="#050d19" stop-opacity="0.80"/>
    </linearGradient>

    <linearGradient id="panelSoft" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0c1a2c" stop-opacity="0.88"/>
      <stop offset="100%" stop-color="#050d19" stop-opacity="0.76"/>
    </linearGradient>

    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <style>
      .ui { font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .eyebrow { fill: #9fb0c8; font-size: 12px; font-weight: 850; letter-spacing: 2.1px; text-transform: uppercase; }
      .headline { fill: #f4f7fb; font-size: 33px; font-weight: 900; letter-spacing: -0.9px; }
      .subline { fill: #dce8f7; font-size: 18px; font-weight: 720; letter-spacing: -0.15px; }
      .label { fill: #9fb0c8; font-size: 12px; font-weight: 850; letter-spacing: 1.8px; text-transform: uppercase; }
      .cardText { fill: #f4f7fb; font-size: 21px; font-weight: 850; letter-spacing: -0.28px; }
      .buttonText { fill: #fff7ef; font-size: 16px; font-weight: 850; letter-spacing: -0.1px; }
    </style>
  </defs>

  <rect width="1200" height="300" fill="url(#bg)"/>
  <circle cx="170" cy="120" r="220" fill="#5bd5f5" opacity="0.055"/>
  <circle cx="860" cy="292" r="260" fill="#4a90e2" opacity="0.08"/>
  <rect width="1200" height="300" fill="url(#grid)" opacity="0.9"/>
  <rect x="0.5" y="0.5" width="1199" height="299" fill="none" stroke="#5bd5f5" stroke-opacity="0.16"/>

  <g opacity="0.95">
    <ellipse cx="190" cy="120" rx="205" ry="78" fill="none" stroke="#5bd5f5" stroke-opacity="0.42" stroke-width="2" transform="rotate(8 190 120)"/>
    <ellipse cx="190" cy="120" rx="126" ry="50" fill="none" stroke="#5bd5f5" stroke-opacity="0.28" stroke-width="1.2" transform="rotate(8 190 120)"/>
    <ellipse cx="190" cy="120" rx="244" ry="94" fill="none" stroke="#5bd5f5" stroke-opacity="0.13" stroke-width="1" transform="rotate(8 190 120)"/>
    <path d="M-80 191 C190 142 355 154 565 118 C760 85 970 74 1280 70" fill="none" stroke="#5bd5f5" stroke-opacity="0.74" stroke-width="3" filter="url(#softGlow)"/>
    <path d="M-80 151 C160 140 360 145 578 150 C780 154 955 162 1280 198" fill="none" stroke="#e8834a" stroke-opacity="0.52" stroke-width="2"/>
    <circle cx="98" cy="135" r="4" fill="#5bd5f5" filter="url(#softGlow)"/>
    <circle cx="292" cy="85" r="4" fill="#e8834a" filter="url(#softGlow)"/>
    <circle cx="424" cy="188" r="4" fill="#4a90e2" filter="url(#softGlow)"/>
  </g>

  <g class="ui" transform="translate(44 238)">
    <rect x="0" y="0" width="170" height="42" rx="13" fill="#e8834a"/>
    <rect x="0.5" y="0.5" width="169" height="41" rx="12.5" fill="none" stroke="#ffc08f" stroke-opacity="0.55"/>
    <text class="buttonText" x="22" y="27">Open Portfolio</text>
    <path d="M138 21H151" stroke="#fff7ef" stroke-width="2.2" stroke-linecap="round"/>
    <path d="M145 15L152 21L145 27" fill="none" stroke="#fff7ef" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <g class="ui" transform="translate(340 36)">
    <rect x="0" y="0" width="820" height="118" rx="22" fill="url(#panel)" stroke="#5bd5f5" stroke-opacity="0.30"/>
    <circle cx="28" cy="28" r="5" fill="#4a90e2"/>
    <circle cx="52" cy="28" r="5" fill="#5bd5f5"/>
    <circle cx="76" cy="28" r="5" fill="#e8834a"/>
    <text class="eyebrow" x="104" y="33">MEDICAL DEVICE R&amp;D ENGINEER</text>

    <text class="headline" x="28" y="78">Miniature medical sensors</text>
    <text class="subline" x="28" y="106">Wearables · implants · clinical validation · data tools</text>
  </g>

  <g class="ui" transform="translate(340 178)">
    <g>
      <rect x="0" y="0" width="260" height="80" rx="18" fill="url(#panelSoft)" stroke="#5bd5f5" stroke-opacity="0.28"/>
      <circle cx="22" cy="22" r="4" fill="#4a90e2"/>
      <circle cx="42" cy="22" r="4" fill="#5bd5f5"/>
      <circle cx="62" cy="22" r="4" fill="#e8834a"/>
      <text class="label" x="82" y="27">BUILD</text>
      <text class="cardText" x="22" y="61">Sensor hardware</text>
    </g>

    <g transform="translate(280 0)">
      <rect x="0" y="0" width="260" height="80" rx="18" fill="url(#panelSoft)" stroke="#e8834a" stroke-opacity="0.36"/>
      <circle cx="22" cy="22" r="4" fill="#4a90e2"/>
      <circle cx="42" cy="22" r="4" fill="#5bd5f5"/>
      <circle cx="62" cy="22" r="4" fill="#e8834a"/>
      <text class="label" x="82" y="27">VALIDATE</text>
      <text class="cardText" x="22" y="61">Study devices</text>
    </g>

    <g transform="translate(560 0)">
      <rect x="0" y="0" width="260" height="80" rx="18" fill="url(#panelSoft)" stroke="#5bd5f5" stroke-opacity="0.28"/>
      <circle cx="22" cy="22" r="4" fill="#4a90e2"/>
      <circle cx="42" cy="22" r="4" fill="#5bd5f5"/>
      <circle cx="62" cy="22" r="4" fill="#e8834a"/>
      <text class="label" x="82" y="27">TRANSLATE</text>
      <text class="cardText" x="22" y="61">FDA + data</text>
    </g>
  </g>
</svg>

    <g><g transform="translate(470 728)" class="icon" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="16" rx="2"/><path d="M7 8h10M7 12h6M7 16h8"/></g><text x="506" y="750" class="heading">About Me</text></g>
    <rect x="56" y="778" width="1088" height="142" rx="18" class="panel" stroke="rgba(232,131,74,.26)"/>
    <text x="92" y="828" class="body"><tspan x="92">I am a biomedical engineer from the University of Arizona focused on implantable and wearable medical systems,</tspan><tspan x="92" dy="29">miniature device design, and the full stack of biomedical product development. I care about building tools</tspan></text>
    <text x="92" y="887" class="body"><tspan x="92">I enjoy hands-on work across electronics, mechanical housings, embedded programming, applications, data</tspan><tspan x="92" dy="29">pipelines, and validation — taking complex sensing problems and reducing them into simple, buildable systems.</tspan></text>


<?xml version="1.0" encoding="UTF-8"?>
<svg id="profile-card" xmlns="http://www.w3.org/2000/svg" width="1200" height="300" viewBox="0 0 1200 300" role="img" aria-label="Alex Burton profile README banner">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#010813"/>
      <stop offset="56%" stop-color="#06101c"/>
      <stop offset="100%" stop-color="#071321"/>
    </linearGradient>
    <pattern id="grid" width="52" height="52" patternUnits="userSpaceOnUse">
      <path d="M52 0H0V52" fill="none" stroke="#5bd5f5" stroke-opacity="0.09" stroke-width="1"/>
    </pattern>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0c1a2c" stop-opacity="0.92"/>
      <stop offset="100%" stop-color="#050d19" stop-opacity="0.80"/>
    </linearGradient>
    <linearGradient id="panelSoft" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0c1a2c" stop-opacity="0.88"/>
      <stop offset="100%" stop-color="#050d19" stop-opacity="0.76"/>
    </linearGradient>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .ui { font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .label { fill: #9fb0c8; font-size: 10px; font-weight: 850; letter-spacing: 2.4px; text-transform: uppercase; }
      .hero { fill: #f4f7fb; font-size: 28px; font-weight: 900; letter-spacing: -1.2px; }
      .item { fill: #f4f7fb; font-size: 12.2px; font-weight: 720; letter-spacing: -0.1px; }
      .site { fill: rgba(244, 247, 251, 0.88); font-size: 19px; font-weight: 800; letter-spacing: -0.2px; }
    </style>
  </defs>

  <rect width="1200" height="300" fill="url(#bg)"/>
  <circle cx="170" cy="120" r="220" fill="#5bd5f5" opacity="0.055"/>
  <circle cx="860" cy="292" r="260" fill="#4a90e2" opacity="0.08"/>
  <rect width="1200" height="300" fill="url(#grid)" opacity="0.9"/>
  <rect x="0.5" y="0.5" width="1199" height="299" fill="none" stroke="#5bd5f5" stroke-opacity="0.16"/>

  <g opacity="0.95">
    <ellipse cx="190" cy="120" rx="205" ry="78" fill="none" stroke="#5bd5f5" stroke-opacity="0.42" stroke-width="2" transform="rotate(8 190 120)"/>
    <ellipse cx="190" cy="120" rx="126" ry="50" fill="none" stroke="#5bd5f5" stroke-opacity="0.28" stroke-width="1.2" transform="rotate(8 190 120)"/>
    <ellipse cx="190" cy="120" rx="244" ry="94" fill="none" stroke="#5bd5f5" stroke-opacity="0.13" stroke-width="1" transform="rotate(8 190 120)"/>
    <path d="M-80 191 C190 142 355 154 565 118 C760 85 970 74 1280 70" fill="none" stroke="#5bd5f5" stroke-opacity="0.74" stroke-width="3" filter="url(#softGlow)"/>
    <path d="M-80 151 C160 140 360 145 578 150 C780 154 955 162 1280 198" fill="none" stroke="#e8834a" stroke-opacity="0.52" stroke-width="2"/>
    <circle cx="98" cy="135" r="4" fill="#5bd5f5" filter="url(#softGlow)"/>
    <circle cx="292" cy="85" r="4" fill="#e8834a" filter="url(#softGlow)"/>
    <circle cx="424" cy="188" r="4" fill="#4a90e2" filter="url(#softGlow)"/>
  </g>

  <g class="ui">
    <text class="site" x="44" y="258">burtonmakes.github.io</text>
    <path d="M265 252H283" stroke="#e8834a" stroke-width="2.2" stroke-linecap="round"/>
    <path d="M278 246L284 252L278 258" fill="none" stroke="#e8834a" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <g class="ui" transform="translate(340 30)">
    <rect x="0" y="0" width="820" height="104" rx="20" fill="url(#panel)" stroke="#5bd5f5" stroke-opacity="0.30"/>
    <circle cx="24" cy="27" r="5" fill="#4a90e2"/>
    <circle cx="47" cy="27" r="5" fill="#5bd5f5"/>
    <circle cx="70" cy="27" r="5" fill="#e8834a"/>
    <text class="label" x="94" y="31">MEDICAL-DEVICE TRANSLATION</text>
    <text class="hero" x="24" y="70">Miniature sensor integration</text>
    <path d="M390 62H421" stroke="#e8834a" stroke-width="2.4" stroke-linecap="round"/>
    <path d="M414 55L422 62L414 69" fill="none" stroke="#e8834a" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
    <text class="hero" x="440" y="70">clinical validation</text>
    <text class="hero" x="24" y="101">FDA-ready systems</text>
    <path d="M282 93H313" stroke="#e8834a" stroke-width="2.4" stroke-linecap="round"/>
    <path d="M306 86L314 93L306 100" fill="none" stroke="#e8834a" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
    <text class="hero" x="332" y="101">commercialization</text>
  </g>

  <g class="ui" transform="translate(340 146)">
    <g>
      <rect x="0" y="0" width="197" height="120" rx="17" fill="url(#panelSoft)" stroke="#5bd5f5" stroke-opacity="0.28"/>
      <circle cx="17" cy="19" r="3.5" fill="#4a90e2"/><circle cx="34" cy="19" r="3.5" fill="#5bd5f5"/><circle cx="51" cy="19" r="3.5" fill="#e8834a"/>
      <text class="label" x="65" y="22">INTEGRATE</text>
      <text class="item" x="17" y="50">
        <tspan x="17">Wearability</tspan>
        <tspan x="17" dy="15">Low-power design</tspan>
        <tspan x="17" dy="15">Sensor packaging</tspan>
        <tspan x="17" dy="15">Skin/device interface</tspan>
      </text>
    </g>
    <g transform="translate(207 0)">
      <rect x="0" y="0" width="197" height="120" rx="17" fill="url(#panelSoft)" stroke="#e8834a" stroke-opacity="0.34"/>
      <circle cx="17" cy="19" r="3.5" fill="#4a90e2"/><circle cx="34" cy="19" r="3.5" fill="#5bd5f5"/><circle cx="51" cy="19" r="3.5" fill="#e8834a"/>
      <text class="label" x="65" y="22">VALIDATE</text>
      <text class="item" x="17" y="50">
        <tspan x="17">Test fixtures</tspan>
        <tspan x="17" dy="15">Preclinical/clinical</tspan>
        <tspan x="17" dy="15">User feedback</tspan>
        <tspan x="17" dy="15">Reliability studies</tspan>
      </text>
    </g>
    <g transform="translate(414 0)">
      <rect x="0" y="0" width="197" height="120" rx="17" fill="url(#panelSoft)" stroke="#5bd5f5" stroke-opacity="0.28"/>
      <circle cx="17" cy="19" r="3.5" fill="#4a90e2"/><circle cx="34" cy="19" r="3.5" fill="#5bd5f5"/><circle cx="51" cy="19" r="3.5" fill="#e8834a"/>
      <text class="label" x="65" y="22">DOCUMENT</text>
      <text class="item" x="17" y="50">
        <tspan x="17">DHF + design docs</tspan>
        <tspan x="17" dy="15">Risk + requirements</tspan>
        <tspan x="17" dy="15">Build/test records</tspan>
        <tspan x="17" dy="15">DV/V&amp;V · FDA/ISO</tspan>
      </text>
    </g>
    <g transform="translate(621 0)">
      <rect x="0" y="0" width="197" height="120" rx="17" fill="url(#panelSoft)" stroke="#5bd5f5" stroke-opacity="0.28"/>
      <circle cx="17" cy="19" r="3.5" fill="#4a90e2"/><circle cx="34" cy="19" r="3.5" fill="#5bd5f5"/><circle cx="51" cy="19" r="3.5" fill="#e8834a"/>
      <text class="label" x="65" y="22">ML/AI NATIVE</text>
      <text class="item" x="17" y="50">
        <tspan x="17">Data workflows</tspan>
        <tspan x="17" dy="15">Signal pipelines</tspan>
        <tspan x="17" dy="15">Model validation</tspan>
        <tspan x="17" dy="15">Explainable outputs</tspan>
      </text>
    </g>
  </g>
</svg>

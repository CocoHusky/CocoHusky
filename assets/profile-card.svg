<g class="ui"><text x="56" y="92" class="eyebrow">BIOMEDICAL ENGINEERING FULL STACK</text><text x="56" y="165" class="title"><tspan x="56">Medical sensor systems from prototype</tspan><tspan x="56" dy="60">to real-world study devices.</tspan></text><text x="56" y="300" class="body"><tspan x="56">I build the hardware, firmware, data workflows, housings, and validation paths</tspan><tspan x="56" dy="28">that turn miniature sensing ideas into usable wearable and implantable medical</tspan></text><rect x="56" y="365" width="1088" height="3" rx="2" fill="url(#rule)" filter="url(#glow)"/><g><g transform="translate(470 413)" class="icon" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 12h4l2-7 4 14 2-7h4"/><path d="M3 20h18"/></g><text x="506" y="435" class="heading">Active Projects</text></g><g transform="translate(56 465)"><rect width="350" height="158" rx="16" class="panel"/><circle cx="28" cy="29" r="5" fill="#22c55e"><animate attributeName="opacity" values="0.7;1;0.7" dur="5s" repeatCount="indefinite"/></circle><text x="46" y="34" class="tiny">ACTIVE</text><text x="24" y="76" class="cardTitle"><tspan x="24">60 GHz mmWave radar sensor</tspan><tspan x="24" dy="25">system</tspan></text><text x="24" y="128" class="mono"><tspan x="24">ESP32-C6 · live dashboard · WiFi</tspan><tspan x="24" dy="18">provisioning · sensor testing</tspan></text></g><g transform="translate(425 465)"><rect width="350" height="158" rx="16" class="panel"/><circle cx="28" cy="29" r="5" fill="#22c55e"><animate attributeName="opacity" values="0.7;1;0.7" dur="5s" repeatCount="indefinite"/></circle><text x="46" y="34" class="tiny">ACTIVE</text><text x="24" y="76" class="cardTitle"><tspan x="24">Proxmox homelab and</tspan><tspan x="24" dy="25">self-hosted stack</tspan></text><text x="24" y="128" class="mono"><tspan x="24">TrueNAS · Nextcloud · Immich ·</tspan><tspan x="24" dy="18">containers · virtual machines</tspan></text></g><g transform="translate(794 465)"><rect width="350" height="158" rx="16" class="panel"/><circle cx="28" cy="29" r="5" fill="#e8834a"><animate attributeName="opacity" values="0.7;1;0.7" dur="5s" repeatCount="indefinite"/></circle><text x="46" y="34" class="tiny">IN PROGRESS</text><text x="24" y="76" class="cardTitle"><tspan x="24">Portfolio rebuild and GitHub</tspan><tspan x="24" dy="25">profile system</tspan></text><text x="24" y="128" class="mono"><tspan x="24">Astro · GitHub Pages · animated</tspan><tspan x="24" dy="18">README SVG</tspan></text></g><g><g transform="translate(470 678)" class="icon" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="16" rx="2"/><path d="M7 8h10M7 12h6M7 16h8"/></g><text x="506" y="700" class="heading">About Me</text></g><rect x="56" y="728" width="1088" height="160" rx="18" class="panel" stroke="rgba(232,131,74,.26)"/><text x="90" y="777" class="body"><tspan x="90">University of Arizona biomedical engineer focused on implantable and wearable medical systems,</tspan><tspan x="90" dy="28">miniaturized devices, and full-stack biomedical product development.</tspan></text><text x="90" y="838" class="body"><tspan x="90">I build across electronics, housings, embedded firmware, applications, data pipelines, and</tspan><tspan x="90" dy="28">validation — turning complex sensing problems into simple, usable systems.</tspan></text><g><g transform="translate(470 948)" class="icon" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2 2 7l10 5 10-5-10-5Z"/><path d="m2 17 10 5 10-5"/><path d="m2 12 10 5 10-5"/></g><text x="506" y="970" class="heading">Tech Stack</text></g><g transform="translate(56 1010)"><rect width="100" height="100" rx="16" class="tile hot"/><text x="50" y="54" class="tileText" text-anchor="middle"><tspan x="50" text-anchor="middle">TypeScript</tspan></text></g><g transform="translate(176 1010)"><rect width="100" height="100" rx="16" class="tile hot"/><text x="50" y="54" class="tileText" text-anchor="middle"><tspan x="50" text-anchor="middl
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="300" viewBox="0 0 1200 300" role="img" aria-labelledby="mmwave-title mmwave-desc">
  <title id="mmwave-title">60 GHz mmWave VisLog</title>
  <desc id="mmwave-desc">A real-time contactless sensing workbench for 60 GHz mmWave radar, embedded firmware, dashboards, and local logging.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#010409"/>
      <stop offset="0.58" stop-color="#06101c"/>
      <stop offset="1" stop-color="#0d1117"/>
    </linearGradient>

    <radialGradient id="blueGlow" cx="0.92" cy="0.16" r="0.72">
      <stop stop-color="#3b82f6" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="orangeGlow" cx="0.08" cy="0.92" r="0.72">
      <stop stop-color="#e8834a" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#e8834a" stop-opacity="0"/>
    </radialGradient>

    <style><![CDATA[
      .ui { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; }
      .mono { font-family: ui-monospace, "SF Mono", Menlo, Monaco, Consolas, monospace; }
      .title { fill:#f5f7fb; font-size:38px; font-weight:820; letter-spacing:-0.9px; }
      .copy { fill:#b6c2d4; font-size:17px; font-weight:450; }
      .stack { fill:#ffb26d; font-size:13px; font-weight:650; letter-spacing:0.2px; }
      .active { fill:#4ade80; }
      .status { fill:#9aa7bc; font-size:11px; font-weight:800; letter-spacing:1.6px; }
    ]]></style>
  </defs>

  <rect width="1200" height="300" rx="22" fill="url(#bg)"/>
  <circle cx="1090" cy="42" r="210" fill="url(#blueGlow)"/>
  <circle cx="98" cy="312" r="180" fill="url(#orangeGlow)"/>
  <rect x="0.5" y="0.5" width="1199" height="299" rx="22" fill="none" stroke="rgba(232,131,74,0.18)"/>

  <g class="ui">
    <circle class="active" cx="62" cy="54" r="5"/>
    <text class="mono status" x="76" y="58">ACTIVE BUILD</text>

    <text class="title" x="62" y="126">60 GHz mmWave VisLog</text>

    <text class="copy" x="62" y="172">A real-time sensing workbench for the Seeed MR60BHA2 radar module.</text>
    <text class="copy" x="62" y="200">It streams contactless heart rate, breathing rate, presence, distance, and</text>
    <text class="copy" x="62" y="228">motion telemetry from an ESP32-based device into local dashboards and logs.</text>
    <text class="copy" x="62" y="256">The goal is to turn raw radar frames into usable health and presence data.</text>

    <text class="mono stack" x="62" y="278">mmWave radar · ESP32-C6 · Arduino · Zephyr · UART/SPI · JSON API · Local logging</text>
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="340" viewBox="0 0 1200 340" role="img" aria-labelledby="mmwave-title mmwave-desc">
  <title id="mmwave-title">60 GHz mmWave VisLog</title>
  <desc id="mmwave-desc">A contactless radar sensing module that tracks chest phase changes for heart rate, breathing, distance, motion, and health status summaries.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#010409"/>
      <stop offset="0.58" stop-color="#06101c"/>
      <stop offset="1" stop-color="#0d1117"/>
    </linearGradient>

    <radialGradient id="blueGlow" cx="0.92" cy="0.16" r="0.72">
      <stop stop-color="#3b82f6" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="orangeGlow" cx="0.08" cy="0.92" r="0.72">
      <stop stop-color="#e8834a" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#e8834a" stop-opacity="0"/>
    </radialGradient>

    <style><![CDATA[
      .ui { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; }
      .mono { font-family: ui-monospace, "SF Mono", Menlo, Monaco, Consolas, monospace; }
      .title { fill:#f5f7fb; font-size:58px; font-weight:820; letter-spacing:-1.6px; }
      .label { fill:#ffb26d; font-size:13px; font-weight:850; letter-spacing:1.4px; }
      .copy { fill:#b6c2d4; font-size:19px; font-weight:460; }
      .stack { fill:#ffb26d; font-size:15px; font-weight:700; letter-spacing:0.1px; }
      .active { fill:#4ade80; }
      .status { fill:#9aa7bc; font-size:13px; font-weight:800; letter-spacing:1.8px; }
    ]]></style>
  </defs>

  <rect width="1200" height="340" rx="22" fill="url(#bg)"/>
  <circle cx="1090" cy="42" r="210" fill="url(#blueGlow)"/>
  <circle cx="98" cy="352" r="180" fill="url(#orangeGlow)"/>
  <rect x="0.5" y="0.5" width="1199" height="339" rx="22" fill="none" stroke="rgba(232,131,74,0.18)"/>

  <g class="ui">
    <circle class="active" cx="62" cy="56" r="5.5"/>
    <text class="mono status" x="76" y="61">ACTIVE BUILD</text>

    <text class="title" x="62" y="126">60 GHz mmWave VisLog</text>

    <text class="label" x="62" y="164">WHAT IT IS</text>
    <text class="copy" x="198" y="164">A contactless radar sensing module that reads tiny chest phase changes for heart rate, breathing, distance, and motion.</text>

    <text class="label" x="62" y="212">WHY BUILD IT</text>
    <text class="copy" x="198" y="212">To collect physiological data without contact during work and sleep, then turn it into health status and trend summaries.</text>

    <text class="label" x="62" y="260">WHAT IT DOES NOW</text>
    <text class="copy" x="244" y="260">Streams sensor data wirelessly over Wi-Fi into local dashboards for live visualization, logging, and action-oriented feedback.</text>

    <text class="mono stack" x="62" y="312">mmWave phase sensing · Heart rate · Breathing · Distance · Motion · Wi-Fi dashboard · Local logging</text>
  </g>
</svg>

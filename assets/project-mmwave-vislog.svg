<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="380" viewBox="0 0 1200 380" role="img" aria-labelledby="mmwave-title mmwave-desc">
  <title id="mmwave-title">60 GHz mmWave VisLog</title>
  <desc id="mmwave-desc">A contactless radar sensing project for vital sign tracking, Wi-Fi visualization, and daily status summaries.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#010409"/>
      <stop offset="0.58" stop-color="#06101c"/>
      <stop offset="1" stop-color="#0d1117"/>
    </linearGradient>

    <radialGradient id="blueGlow" cx="0.92" cy="0.16" r="0.72">
      <stop stop-color="#3b82f6" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="orangeGlow" cx="0.08" cy="0.92" r="0.72">
      <stop stop-color="#e8834a" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#e8834a" stop-opacity="0"/>
    </radialGradient>

    <style><![CDATA[
      .ui { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; }
      .mono { font-family: ui-monospace, "SF Mono", Menlo, Monaco, Consolas, monospace; }
      .title { fill:#f5f7fb; font-size:58px; font-weight:820; letter-spacing:-1.6px; }
      .copy { fill:#b6c2d4; font-size:19px; font-weight:460; }
      .stack { fill:#ffb26d; font-size:14.5px; font-weight:700; letter-spacing:0.1px; }
      .active { fill:#4ade80; }
      .status { fill:#9aa7bc; font-size:13px; font-weight:800; letter-spacing:1.8px; }
    ]]></style>
  </defs>

  <rect width="1200" height="380" rx="22" fill="url(#bg)"/>
  <circle cx="1090" cy="42" r="210" fill="url(#blueGlow)"/>
  <circle cx="98" cy="392" r="180" fill="url(#orangeGlow)"/>
  <rect x="0.5" y="0.5" width="1199" height="379" rx="22" fill="none" stroke="rgba(232,131,74,0.18)"/>

  <g class="ui">
    <circle class="active" cx="62" cy="56" r="5.5"/>
    <text class="mono status" x="76" y="61">ACTIVE BUILD</text>

    <text class="title" x="62" y="128">60 GHz mmWave VisLog</text>

    <text class="copy" x="62" y="174">60 GHz mmWave VisLog uses radar phase changes at the chest to estimate heart rate,</text>
    <text class="copy" x="62" y="202">breathing, distance, and motion without requiring direct contact.</text>
    <text class="copy" x="62" y="230">I built it to feed me contactless vital sign data during work hours and during sleep.</text>
    <text class="copy" x="62" y="258">It now streams data over Wi-Fi into local dashboards for live status, trends, logs,</text>
    <text class="copy" x="62" y="286">daily wellness summaries, and actions to take to improve my wellbeing.</text>

    <text class="mono stack" x="62" y="354">mmWave phase sensing · Heart rate · Breathing · Distance · Motion · Wi-Fi dashboard · Local logging</text>
  </g>
</svg>

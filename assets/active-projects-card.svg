<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-labelledby="activity-title activity-desc">
  <title id="activity-title">Project Activity</title>
  <desc id="activity-desc">Three project activity cards with short summaries and compact skill labels.</desc>

  <defs>
    <linearGradient id="activity-bg" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#010409"/>
      <stop offset="0.58" stop-color="#06101c"/>
      <stop offset="1" stop-color="#0d1117"/>
    </linearGradient>

    <radialGradient id="orange-glow" cx="0.12" cy="0.12" r="0.85">
      <stop stop-color="#e8834a" stop-opacity="0.20"/>
      <stop offset="1" stop-color="#e8834a" stop-opacity="0"/>
    </radialGradient>

    <style><![CDATA[
      .ui-font {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      }

      .mono-font {
        font-family: ui-monospace, "SF Mono", Menlo, Monaco, Consolas, monospace;
      }

      .canvas {
        fill: url(#activity-bg);
      }

      .glow {
        fill: url(#orange-glow);
      }

      .eyebrow {
        fill: #ffb26d;
        font-size: 12px;
        font-weight: 800;
        letter-spacing: 2.8px;
      }

      .section-title {
        fill: #f5f7fb;
        font-size: 34px;
        font-weight: 820;
        letter-spacing: -0.8px;
      }

      .section-summary {
        fill: #8b98ad;
        font-size: 15px;
        font-weight: 450;
      }

      .portfolio-pill {
        fill: #e8834a;
        stroke: rgba(255, 178, 109, 0.42);
        stroke-width: 1;
      }

      .portfolio-text {
        fill: #010409;
        font-size: 13px;
        font-weight: 800;
      }

      .card {
        fill: rgba(13, 17, 23, 0.78);
        stroke: rgba(232, 131, 74, 0.18);
        stroke-width: 1;
      }

      .status-dot-active {
        fill: #4ade80;
      }

      .status-dot-final {
        fill: #f59e0b;
      }

      .status-text {
        fill: #8b98ad;
        font-size: 11px;
        font-weight: 800;
        letter-spacing: 1.6px;
      }

      .card-title {
        fill: #f5f7fb;
        font-size: 21px;
        font-weight: 780;
      }

      .card-summary {
        fill: #9aa7bc;
        font-size: 13.5px;
        font-weight: 450;
      }

      .orange-line {
        stroke: #e8834a;
        stroke-width: 2;
        stroke-linecap: round;
        opacity: 0.82;
      }

      .tag {
        fill: rgba(30, 45, 64, 0.82);
        stroke: rgba(91, 155, 213, 0.28);
        stroke-width: 1;
      }

      .tag-warm {
        fill: rgba(42, 32, 16, 0.86);
        stroke: rgba(232, 131, 74, 0.30);
        stroke-width: 1;
      }

      .tag-text {
        fill: #b8d7f4;
        font-size: 12px;
        font-weight: 650;
      }

      .tag-text-warm {
        fill: #ffc078;
        font-size: 12px;
        font-weight: 650;
      }
    ]]></style>
  </defs>

  <rect class="canvas" width="1200" height="520" rx="22"/>
  <circle class="glow" cx="115" cy="74" r="210"/>

  <g class="ui-font">
    <text class="eyebrow" x="48" y="54">PROJECT ACTIVITY</text>
    <text class="section-title" x="48" y="94">What I am building right now</text>
    <text class="section-summary" x="48" y="126">Hardware, embedded systems, data tools, and product-facing engineering projects tied to medical sensing and local-first systems.</text>

    <g aria-label="BurtonMakes portfolio button">
      <rect class="portfolio-pill" x="996" y="48" width="154" height="38" rx="19"/>
      <text class="portfolio-text" x="1020" y="72">BurtonMakes →</text>
    </g>

    <g id="radar-card">
      <rect class="card" x="48" y="164" width="344" height="304" rx="18"/>
      <circle class="status-dot-active" cx="76" cy="194" r="5"/>
      <text class="mono-font status-text" x="90" y="198">ACTIVE BUILD</text>
      <text class="card-title" x="76" y="234">60 GHz mmWave Radar</text>
      <text class="card-summary" x="76" y="260">Real-time radar streaming for contactless</text>
      <text class="card-summary" x="76" y="280">physiology and presence sensing.</text>
      <line class="orange-line" x1="76" y1="304" x2="142" y2="304"/>

      <g class="mono-font" text-anchor="middle">
        <rect class="tag" x="76" y="326" width="74" height="26" rx="7"/><text class="tag-text" x="113" y="344">ESP32-C6</text>
        <rect class="tag" x="158" y="326" width="84" height="26" rx="7"/><text class="tag-text" x="200" y="344">Zephyr</text>
        <rect class="tag" x="250" y="326" width="92" height="26" rx="7"/><text class="tag-text" x="296" y="344">UART parser</text>
        <rect class="tag" x="76" y="360" width="96" height="26" rx="7"/><text class="tag-text" x="124" y="378">Sensor data</text>
        <rect class="tag" x="180" y="360" width="92" height="26" rx="7"/><text class="tag-text" x="226" y="378">Live charts</text>
        <rect class="tag" x="280" y="360" width="74" height="26" rx="7"/><text class="tag-text" x="317" y="378">OTA</text>
        <rect class="tag" x="76" y="394" width="96" height="26" rx="7"/><text class="tag-text" x="124" y="412">Data logger</text>
        <rect class="tag" x="180" y="394" width="92" height="26" rx="7"/><text class="tag-text" x="226" y="412">Device UI</text>
      </g>
    </g>

    <g id="profile-card">
      <rect class="card" x="428" y="164" width="344" height="304" rx="18"/>
      <circle class="status-dot-active" cx="456" cy="194" r="5"/>
      <text class="mono-font status-text" x="470" y="198">ACTIVE BUILD</text>
      <text class="card-title" x="456" y="234">Professional Profile</text>
      <text class="card-summary" x="456" y="260">Recruiter-facing portfolio and GitHub profile</text>
      <text class="card-summary" x="456" y="280">that show engineering depth clearly.</text>
      <line class="orange-line" x1="456" y1="304" x2="522" y2="304"/>

      <g class="mono-font" text-anchor="middle">
        <rect class="tag" x="456" y="326" width="72" height="26" rx="7"/><text class="tag-text" x="492" y="344">Astro</text>
        <rect class="tag" x="536" y="326" width="84" height="26" rx="7"/><text class="tag-text" x="578" y="344">GitHub CI</text>
        <rect class="tag" x="628" y="326" width="82" height="26" rx="7"/><text class="tag-text" x="669" y="344">SVG UI</text>
        <rect class="tag" x="456" y="360" width="86" height="26" rx="7"/><text class="tag-text" x="499" y="378">Portfolio</text>
        <rect class="tag" x="550" y="360" width="104" height="26" rx="7"/><text class="tag-text" x="602" y="378">Analytics</text>
        <rect class="tag" x="662" y="360" width="78" height="26" rx="7"/><text class="tag-text" x="701" y="378">Resume</text>
        <rect class="tag" x="456" y="394" width="96" height="26" rx="7"/><text class="tag-text" x="504" y="412">Case studies</text>
        <rect class="tag" x="560" y="394" width="94" height="26" rx="7"/><text class="tag-text" x="607" y="412">Docs flow</text>
      </g>
    </g>

    <g id="homelab-card">
      <rect class="card" x="808" y="164" width="344" height="304" rx="18"/>
      <circle class="status-dot-final" cx="836" cy="194" r="5"/>
      <text class="mono-font status-text" x="850" y="198">SYSTEM BUILD</text>
      <text class="card-title" x="836" y="234">Home Lab Server</text>
      <text class="card-summary" x="836" y="260">Local-first compute, backups, storage, and</text>
      <text class="card-summary" x="836" y="280">automation for personal infrastructure.</text>
      <line class="orange-line" x1="836" y1="304" x2="902" y2="304"/>

      <g class="mono-font" text-anchor="middle">
        <rect class="tag-warm" x="836" y="326" width="88" height="26" rx="7"/><text class="tag-text-warm" x="880" y="344">Proxmox</text>
        <rect class="tag-warm" x="932" y="326" width="74" height="26" rx="7"/><text class="tag-text-warm" x="969" y="344">ZFS</text>
        <rect class="tag-warm" x="1014" y="326" width="82" height="26" rx="7"/><text class="tag-text-warm" x="1055" y="344">Docker</text>
        <rect class="tag-warm" x="836" y="360" width="76" height="26" rx="7"/><text class="tag-text-warm" x="874" y="378">Backups</text>
        <rect class="tag-warm" x="920" y="360" width="104" height="26" rx="7"/><text class="tag-text-warm" x="972" y="378">Self-hosting</text>
        <rect class="tag-warm" x="1032" y="360" width="74" height="26" rx="7"/><text class="tag-text-warm" x="1069" y="378">NAS</text>
        <rect class="tag-warm" x="836" y="394" width="98" height="26" rx="7"/><text class="tag-text-warm" x="885" y="412">VM / LXC</text>
        <rect class="tag-warm" x="942" y="394" width="104" height="26" rx="7"/><text class="tag-text-warm" x="994" y="412">Local AI</text>
      </g>
    </g>
  </g>
</svg>

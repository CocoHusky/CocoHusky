<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="558" viewBox="0 0 860 400" role="img" aria-labelledby="active-title active-desc">
  <title id="active-title">Active Projects</title>
  <desc id="active-desc">Three compact active project cards for radar, professional profile, and home lab work.</desc>

  <defs>
    <style><![CDATA[
      .ui-font {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      }

      .mono-font {
        font-family: ui-monospace, "SF Mono", Menlo, Monaco, Consolas, monospace;
      }

      .canvas {
        fill: #161b22;
      }

      .card {
        fill: #1c2230;
        stroke: #2a3345;
        stroke-width: 1;
      }

      .section-title {
        fill: #f0f4ff;
        font-size: 22px;
        font-weight: 700;
      }

      .section-subtitle {
        fill: #6b7fa3;
        font-size: 12px;
        letter-spacing: 0.04em;
      }

      .status-active {
        fill: #4ade80;
        font-size: 10px;
        font-weight: 600;
        letter-spacing: 0.1em;
      }

      .status-finalized {
        fill: #f59e0b;
        font-size: 10px;
        font-weight: 600;
        letter-spacing: 0.1em;
      }

      .title-text {
        fill: #e8edf8;
        font-size: 17px;
        font-weight: 700;
      }

      .summary-text {
        fill: #fb923c;
        font-size: 11px;
        font-weight: 600;
      }

      .card-rule {
        stroke: #2a3345;
        stroke-width: 0.75;
      }

      .tag-blue {
        fill: #1e2d40;
        stroke: #2a4060;
        stroke-width: 0.75;
      }

      .tag-blue-text {
        fill: #7ab8e8;
        font-size: 10.5px;
      }

      .tag-amber {
        fill: #2a2010;
        stroke: #4a3a10;
        stroke-width: 0.75;
      }

      .tag-amber-text {
        fill: #f5c060;
        font-size: 10.5px;
      }
    ]]></style>
  </defs>

  <rect class="canvas" width="860" height="400" rx="16"/>

  <g class="ui-font">
    <text class="section-title" x="36" y="52">Active Projects</text>
    <text class="mono-font section-subtitle" x="36" y="70">tech build focus · agentic native · embedded sys. · bio-sensing</text>

    <g id="radar-card">
      <rect class="card" x="28" y="90" width="262" height="292" rx="12"/>
      <circle cx="48" cy="114" r="4" fill="#4ade80"/>
      <text class="mono-font status-active" x="58" y="118">ACTIVE</text>
      <text class="title-text" x="48" y="148">60 GHz mmWave Radar</text>
      <text class="mono-font summary-text" x="48" y="168">Contactless physiology monitoring</text>
      <line class="card-rule" x1="48" y1="182" x2="270" y2="182"/>

      <g class="mono-font tag-blue-text" text-anchor="middle">
        <rect class="tag-blue" x="44" y="192" width="90" height="20" rx="4"/><text x="89" y="206">UART parsing</text>
        <rect class="tag-blue" x="140" y="192" width="110" height="20" rx="4"/><text x="195" y="206">VisLog stream API</text>
        <rect class="tag-blue" x="44" y="218" width="90" height="20" rx="4"/><text x="89" y="232">Sensor fusion</text>
        <rect class="tag-blue" x="140" y="218" width="110" height="20" rx="4"/><text x="195" y="232">Deterministic DSP</text>
        <rect class="tag-blue" x="44" y="244" width="72" height="20" rx="4"/><text x="80" y="258">Secure OTA</text>
        <rect class="tag-blue" x="122" y="244" width="76" height="20" rx="4"/><text x="160" y="258">Zephyr RTOS</text>
        <rect class="tag-blue" x="204" y="244" width="48" height="20" rx="4"/><text x="228" y="258">HIL CI</text>
        <rect class="tag-blue" x="44" y="270" width="52" height="20" rx="4"/><text x="70" y="284">ESP32</text>
        <rect class="tag-blue" x="102" y="270" width="88" height="20" rx="4"/><text x="146" y="284">nRF52840 SoC</text>
        <rect class="tag-blue" x="196" y="270" width="80" height="20" rx="4"/><text x="236" y="284">Captive layer</text>
      </g>
    </g>

    <g id="profile-card">
      <rect class="card" x="302" y="90" width="262" height="292" rx="12"/>
      <circle cx="322" cy="114" r="4" fill="#4ade80"/>
      <text class="mono-font status-active" x="332" y="118">ACTIVE</text>
      <text class="title-text" x="322" y="148">Professional Profile</text>
      <text class="mono-font summary-text" x="322" y="168">Recruiter-facing docs &amp; automation</text>
      <line class="card-rule" x1="322" y1="182" x2="544" y2="182"/>

      <g class="mono-font tag-blue-text" text-anchor="middle">
        <rect class="tag-blue" x="318" y="192" width="70" height="20" rx="4"/><text x="353" y="206">Astro SSG</text>
        <rect class="tag-blue" x="394" y="192" width="94" height="20" rx="4"/><text x="441" y="206">Semantic DOM</text>
        <rect class="tag-blue" x="318" y="218" width="110" height="20" rx="4"/><text x="373" y="232">Git-driven lifecycle</text>
        <rect class="tag-blue" x="434" y="218" width="100" height="20" rx="4"/><text x="484" y="232">CI/CD deploy</text>
        <rect class="tag-blue" x="318" y="244" width="90" height="20" rx="4"/><text x="363" y="258">Dynamic SVG</text>
        <rect class="tag-blue" x="414" y="244" width="118" height="20" rx="4"/><text x="473" y="258">HTTP cache tuning</text>
        <rect class="tag-blue" x="318" y="270" width="98" height="20" rx="4"/><text x="367" y="284">Telemetry infra</text>
        <rect class="tag-blue" x="422" y="270" width="110" height="20" rx="4"/><text x="477" y="284">Ingestion pipelines</text>
        <rect class="tag-blue" x="318" y="296" width="96" height="20" rx="4"/><text x="366" y="310">Funnel tracking</text>
        <rect class="tag-blue" x="420" y="296" width="96" height="20" rx="4"/><text x="468" y="310">Conversion UX</text>
      </g>
    </g>

    <g id="homelab-card">
      <rect class="card" x="576" y="90" width="262" height="292" rx="12"/>
      <circle cx="596" cy="114" r="4" fill="#f59e0b"/>
      <text class="mono-font status-finalized" x="606" y="118">FINALIZED</text>
      <text class="title-text" x="596" y="148">Home Lab Server</text>
      <text class="mono-font summary-text" x="596" y="168">Local-first storage, backups, AI</text>
      <line class="card-rule" x1="596" y1="182" x2="818" y2="182"/>

      <g class="mono-font tag-amber-text" text-anchor="middle">
        <rect class="tag-amber" x="592" y="192" width="84" height="20" rx="4"/><text x="634" y="206">Proxmox VE</text>
        <rect class="tag-amber" x="682" y="192" width="108" height="20" rx="4"/><text x="736" y="206">KVM/LXC tenancy</text>
        <rect class="tag-amber" x="592" y="218" width="68" height="20" rx="4"/><text x="626" y="232">ZFS pools</text>
        <rect class="tag-amber" x="666" y="218" width="74" height="20" rx="4"/><text x="703" y="232">Snapshots</text>
        <rect class="tag-amber" x="746" y="218" width="78" height="20" rx="4"/><text x="785" y="232">Replication</text>
        <rect class="tag-amber" x="592" y="244" width="130" height="20" rx="4"/><text x="657" y="258">Self-hosted orch.</text>
        <rect class="tag-amber" x="728" y="244" width="96" height="20" rx="4"/><text x="776" y="258">Index pipelines</text>
        <rect class="tag-amber" x="592" y="270" width="104" height="20" rx="4"/><text x="644" y="284">Docker Compose</text>
        <rect class="tag-amber" x="702" y="270" width="96" height="20" rx="4"/><text x="750" y="284">ClawCode tools</text>
        <rect class="tag-amber" x="592" y="296" width="108" height="20" rx="4"/><text x="646" y="310">Edge-node cluster</text>
        <rect class="tag-amber" x="706" y="296" width="82" height="20" rx="4"/><text x="747" y="310">ARM64 SBCs</text>
      </g>
    </g>
  </g>
</svg>

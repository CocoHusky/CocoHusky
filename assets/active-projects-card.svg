<svg id="readme-asset" xmlns="http://www.w3.org/2000/svg" width="640" height="560" viewBox="0 0 640 560" role="img" aria-labelledby="title desc">
  <title id="title">Active projects</title>
  <desc id="desc">Active projects card for embedded systems, sensing, home lab infrastructure, and profile automation.</desc>
  <defs>
    <linearGradient id="card-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#010409" />
      <stop offset="58%" stop-color="#06101c" />
      <stop offset="100%" stop-color="#0d1117" />
    </linearGradient>
    <radialGradient id="card-glow" cx="72%" cy="10%" r="70%">
      <stop offset="0%" stop-color="#e8834a" stop-opacity="0.12" />
      <stop offset="70%" stop-color="#e8834a" stop-opacity="0" />
    </radialGradient>
    <filter id="tag-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <style><![CDATA[
      .text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; }
      .mono { font-family: ui-monospace, SFMono-Regular, SF Pro Mono, Menlo, Monaco, Consolas, monospace; }
      .status-dot { animation: status-pulse 2.6s ease-in-out infinite alternate; filter: url(#tag-glow); }
      .project-card { animation: card-breathe 7s ease-in-out infinite alternate; transform-box: fill-box; transform-origin: center; }
      .project-card.two { animation-delay: -1.5s; }
      .project-card.three { animation-delay: -3s; }
      @keyframes status-pulse {
        from { opacity: 0.58; transform: scale(0.84); }
        to { opacity: 1; transform: scale(1.16); }
      }
      @keyframes card-breathe {
        from { opacity: 0.92; }
        to { opacity: 1; }
      }
    ]]></style>
  </defs>

  <rect x="0.5" y="0.5" width="639" height="559" rx="18" fill="url(#card-bg)" stroke="#e8834a" stroke-opacity="0.18" />
  <rect x="0" y="0" width="640" height="560" rx="18" fill="url(#card-glow)" />

  <g class="text">
    <text x="28" y="50" fill="#f5f7fb" font-size="22" font-weight="800">Active Projects</text>
    <text x="28" y="72" fill="#7e8a9b" font-size="10.5" font-weight="700" letter-spacing="1.25">tech build focus · embedded systems · bio-sensing</text>
  </g>

  <g class="project-grid text">
    <g class="project-card one">
      <rect x="28" y="88" width="282" height="205" rx="16" fill="#111821" fill-opacity="0.78" stroke="#e8834a" stroke-opacity="0.20" />
      <circle class="status-dot" cx="50" cy="113" r="4" fill="#22c55e" />
      <text x="64" y="117" fill="#7e8a9b" font-size="10.5" font-weight="700" letter-spacing="1.4">ACTIVE</text>
      <text x="46" y="157" fill="#f5f7fb" font-size="18" font-weight="760">60 GHz mmWave Radar</text>
      <text x="46" y="184" fill="#ffb26d" font-size="11.8" font-weight="650">Contactless physiology monitoring</text>

      <g class="mono" font-size="9.6" fill="#d7dfec">
        <rect x="46" y="210" width="76" height="23" rx="6" fill="#010409" fill-opacity="0.62" stroke="#e8834a" stroke-opacity="0.26" />
        <text x="54" y="225">UART parsing</text>
        <rect x="128" y="210" width="65" height="23" rx="6" fill="#010409" fill-opacity="0.62" stroke="#e8834a" stroke-opacity="0.26" />
        <text x="136" y="225">VisLog API</text>
        <rect x="199" y="210" width="80" height="23" rx="6" fill="#010409" fill-opacity="0.62" stroke="#e8834a" stroke-opacity="0.26" />
        <text x="207" y="225">Sensor fusion</text>
        <rect x="46" y="242" width="62" height="23" rx="6" fill="#010409" fill-opacity="0.62" stroke="#e8834a" stroke-opacity="0.26" />
        <text x="54" y="257">HR/BR DSP</text>
        <rect x="114" y="242" width="66" height="23" rx="6" fill="#010409" fill-opacity="0.62" stroke="#e8834a" stroke-opacity="0.26" />
        <text x="122" y="257">Secure OTA</text>
        <rect x="186" y="242" width="74" height="23" rx="6" fill="#010409" fill-opacity="0.62" stroke="#e8834a" stroke-opacity="0.26" />
        <text x="194" y="257">Zephyr RTOS</text>
      </g>
    </g>

    <g class="project-card two">
      <rect x="330" y="88" width="282" height="205" rx="16" fill="#111821" fill-opacity="0.78" stroke="#e8834a" stroke-opacity="0.20" />
      <circle class="status-dot" cx="352" cy="113" r="4" fill="#e8834a" />
      <text x="366" y="117" fill="#7e8a9b" font-size="10.5" font-weight="700" letter-spacing="1.4">FINALIZED</text>
      <text x="348" y="157" fill="#f5f7fb" font-size="18" font-weight="760">Home Lab Server</text>
      <text x="348" y="184" fill="#ffb26d" font-size="11.8" font-weight="650">Local-first storage, services, private AI</text>

      <g class="mono" font-size="9.6" fill="#d7dfec">
        <rect x="348" y="210" width="72" height="23" rx="6" fill="#010409" fill-opacity="0.62" stroke="#e8834a" stroke-opacity="0.26" />
        <text x="356" y="225">Proxmox VE</text>
        <rect x="426" y="210" width="58" height="23" rx="6" fill="#010409" fill-opacity="0.62" stroke="#e8834a" stroke-opacity="0.26" />
        <text x="434" y="225">KVM/LXC</text>
        <rect x="490" y="210" width="59" height="23" rx="6" fill="#010409" fill-opacity="0.62" stroke="#e8834a" stroke-opacity="0.26" />
        <text x="498" y="225">ZFS pools</text>
        <rect x="348" y="242" width="62" height="23" rx="6" fill="#010409" fill-opacity="0.62" stroke="#e8834a" stroke-opacity="0.26" />
        <text x="356" y="257">Snapshots</text>
        <rect x="416" y="242" width="72" height="23" rx="6" fill="#010409" fill-opacity="0.62" stroke="#e8834a" stroke-opacity="0.26" />
        <text x="424" y="257">Replication</text>
        <rect x="494" y="242" width="50" height="23" rx="6" fill="#010409" fill-opacity="0.62" stroke="#e8834a" stroke-opacity="0.26" />
        <text x="502" y="257">Docker</text>
      </g>
    </g>

    <g class="project-card three">
      <rect x="28" y="313" width="584" height="182" rx="16" fill="#111821" fill-opacity="0.78" stroke="#e8834a" stroke-opacity="0.20" />
      <circle class="status-dot" cx="50" cy="338" r="4" fill="#22c55e" />
      <text x="64" y="342" fill="#7e8a9b" font-size="10.5" font-weight="700" letter-spacing="1.4">ACTIVE</text>
      <text x="46" y="382" fill="#f5f7fb" font-size="18" font-weight="760">Professional Profile</text>
      <text x="46" y="409" fill="#ffb26d" font-size="11.8" font-weight="650">Recruiter-facing documentation and automation</text>

      <g class="mono" font-size="9.6" fill="#d7dfec">
        <rect x="46" y="435" width="62" height="23" rx="6" fill="#010409" fill-opacity="0.62" stroke="#e8834a" stroke-opacity="0.26" />
        <text x="54" y="450">Astro SSG</text>
        <rect x="114" y="435" width="82" height="23" rx="6" fill="#010409" fill-opacity="0.62" stroke="#e8834a" stroke-opacity="0.26" />
        <text x="122" y="450">Semantic DOM</text>
        <rect x="202" y="435" width="114" height="23" rx="6" fill="#010409" fill-opacity="0.62" stroke="#e8834a" stroke-opacity="0.26" />
        <text x="210" y="450">Git-driven lifecycle</text>
        <rect x="322" y="435" width="90" height="23" rx="6" fill="#010409" fill-opacity="0.62" stroke="#e8834a" stroke-opacity="0.26" />
        <text x="330" y="450">CI/CD deploy</text>
        <rect x="418" y="435" width="76" height="23" rx="6" fill="#010409" fill-opacity="0.62" stroke="#e8834a" stroke-opacity="0.26" />
        <text x="426" y="450">Dynamic SVG</text>
        <rect x="46" y="467" width="100" height="23" rx="6" fill="#010409" fill-opacity="0.62" stroke="#e8834a" stroke-opacity="0.26" />
        <text x="54" y="482">HTTP cache tuning</text>
        <rect x="152" y="467" width="86" height="23" rx="6" fill="#010409" fill-opacity="0.62" stroke="#e8834a" stroke-opacity="0.26" />
        <text x="160" y="482">Telemetry infra</text>
      </g>
    </g>
  </g>
</svg>

<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Alex Burton Profile Banner</title>
<style>
  :root {
    --bg0: #010813;
    --bg1: #06101c;
    --bg2: #071321;
    --grid: rgba(91, 213, 245, 0.10);
    --blue: #4a90e2;
    --cyan: #5bd5f5;
    --orange: #e8834a;
    --text: #f4f7fb;
    --muted: #9fb0c8;
    --panel-border: rgba(91, 213, 245, 0.32);
  }

  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: grid;
    place-items: center;
    background: #050b16;
    font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }

  .banner {
    position: relative;
    width: min(1200px, 100vw);
    aspect-ratio: 4 / 1;
    overflow: hidden;
    border-radius: 30px;
    color: var(--text);
    background:
      radial-gradient(circle at 18% 40%, rgba(91,213,245,.14), transparent 20%),
      radial-gradient(circle at 66% 88%, rgba(74,144,226,.16), transparent 24%),
      linear-gradient(115deg, var(--bg0), var(--bg1) 54%, var(--bg2));
    border: 1px solid rgba(91, 213, 245, 0.16);
    box-shadow: 0 30px 90px rgba(0,0,0,.38);
  }

  .banner::before {
    content: "";
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(var(--grid) 1px, transparent 1px),
      linear-gradient(90deg, var(--grid) 1px, transparent 1px);
    background-size: 52px 52px;
    opacity: .75;
  }

  .torus {
    position: absolute;
    left: 42px;
    top: 64px;
    width: 300px;
    height: 140px;
    border-radius: 50%;
    border: 2px solid rgba(91,213,245,.48);
    transform: rotate(10deg) skewX(-18deg);
    box-shadow: 0 0 24px rgba(91,213,245,.28), inset 0 0 34px rgba(91,213,245,.12);
  }
  .torus::before,
  .torus::after {
    content: "";
    position: absolute;
    border-radius: 50%;
    border: 1px solid rgba(91,213,245,.30);
  }
  .torus::before { inset: 22px 52px; box-shadow: inset 0 0 24px rgba(0,0,0,.55); }
  .torus::after { inset: -18px -38px; opacity: .35; }

  .line {
    position: absolute;
    left: -70px;
    width: 1320px;
    height: 120px;
    border-radius: 50%;
    transform: rotate(-8deg);
    border-top: 3px solid transparent;
    pointer-events: none;
  }
  .line.cyan { top: 112px; border-color: rgba(91,213,245,.78); filter: drop-shadow(0 0 10px rgba(91,213,245,.38)); }
  .line.orange { top: 152px; border-color: rgba(232,131,74,.58); transform: rotate(5deg); }

  .node {
    position: absolute;
    width: 8px;
    height: 8px;
    border-radius: 999px;
    background: var(--cyan);
    box-shadow: 0 0 16px currentColor;
  }
  .n1 { left: 98px; top: 135px; color: var(--cyan); }
  .n2 { left: 292px; top: 85px; color: var(--orange); background: var(--orange); }
  .n3 { left: 425px; top: 188px; color: var(--blue); background: var(--blue); }

  .panel {
    position: absolute;
    border-radius: 18px;
    background: linear-gradient(180deg, rgba(12, 26, 44, .88), rgba(5, 13, 25, .74));
    border: 1px solid var(--panel-border);
    box-shadow: inset 0 -24px 70px rgba(74,144,226,.10), 0 22px 60px rgba(0,0,0,.28);
    backdrop-filter: blur(12px);
  }
  .panel.orange { border-color: rgba(232,131,74,.34); box-shadow: inset 0 -20px 55px rgba(232,131,74,.09), 0 22px 60px rgba(0,0,0,.24); }
  .panel.focus { left: 355px; top: 46px; width: 390px; height: 198px; }
  .panel.build { left: 760px; top: 46px; width: 385px; height: 88px; }
  .panel.exec { left: 760px; top: 156px; width: 385px; height: 88px; }

  .dots { display: flex; gap: 10px; position: absolute; left: 26px; top: 24px; }
  .dot { width: 10px; height: 10px; border-radius: 999px; }
  .dot.blue { background: var(--blue); }
  .dot.cyan { background: var(--cyan); }
  .dot.orange { background: var(--orange); }

  .label {
    position: absolute;
    left: 26px;
    top: 74px;
    color: var(--muted);
    font-size: 12px;
    font-weight: 850;
    letter-spacing: .34em;
  }
  .title {
    position: absolute;
    left: 26px;
    right: 22px;
    bottom: 30px;
    color: var(--text);
    font-weight: 900;
    line-height: 1.08;
    letter-spacing: -.035em;
  }
  .focus .title { font-size: 38px; }
  .build .label,
  .exec .label { top: 46px; font-size: 11px; }
  .build .title { bottom: 20px; font-size: 24px; letter-spacing: -.02em; }
  .exec .title { bottom: 17px; font-size: 19px; line-height: 1.05; letter-spacing: -.02em; }
  .arrow { color: var(--orange); }
</style>
</head>
<body>
  <main class="banner" aria-label="Alex Burton profile banner">
    <div class="torus"></div>
    <div class="line cyan"></div>
    <div class="line orange"></div>
    <span class="node n1"></span>
    <span class="node n2"></span>
    <span class="node n3"></span>

    <section class="panel focus">
      <div class="dots"><span class="dot blue"></span><span class="dot cyan"></span><span class="dot orange"></span></div>
      <div class="label">FOCUS</div>
      <div class="title">Novel sensors <span class="arrow">→</span><br />clinical devices</div>
    </section>

    <section class="panel build orange">
      <div class="dots"><span class="dot blue"></span><span class="dot cyan"></span><span class="dot orange"></span></div>
      <div class="label">BUILD</div>
      <div class="title">Miniature medical systems</div>
    </section>

    <section class="panel exec">
      <div class="dots"><span class="dot blue"></span><span class="dot cyan"></span><span class="dot orange"></span></div>
      <div class="label">EXECUTION</div>
      <div class="title">Requirements · risk · V&amp;V<br />FDA documentation</div>
    </section>
  </main>
</body>
</html>

name: Patch hero banner once

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/patch-hero-banner-once.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Patch hero banner text and button
        run: |
          python3 <<'PY'
          from pathlib import Path

          path = Path('assets/hero-banner.svg')
          text = path.read_text()

          old = '''  <text class="body-copy" x="44" y="238">I like building devices that make health data easier to understand,</text>
  <text class="body-copy" x="44" y="263">give people better tools, and help care feel less uncertain.</text>
</g>'''

          new = '''  <text class="body-copy" x="44" y="218">I build across electronics, firmware, software, data pipelines,</text>
  <text class="body-copy" x="44" y="243">validation, and clinical needs to turn early sensing concepts</text>
  <text class="body-copy" x="44" y="268">into wearable and implantable systems for real-world use.</text>
  <g aria-label="Portfolio button">
    <rect x="1014" y="300" width="142" height="40" rx="20" fill="#e8834a" opacity="0.18"/>
    <rect x="1014" y="296" width="142" height="40" rx="20" fill="#e8834a" stroke="rgba(255,178,109,0.48)" stroke-width="1"/>
    <text x="1038" y="322" fill="#010409" font-size="15px" font-weight="850" letter-spacing="0.2px">Portfolio →</text>
  </g>
</g>'''

          if old not in text:
              raise SystemExit('Expected hero text block not found; refusing to patch.')

          path.write_text(text.replace(old, new, 1))
          PY

      - name: Remove temporary workflow
        run: rm .github/workflows/patch-hero-banner-once.yml

      - name: Commit patched SVG
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/hero-banner.svg .github/workflows/patch-hero-banner-once.yml
          git commit -m "Update hero banner text and portfolio button"
          git push

name: Render profile APNG assets

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - assets-src/**
      - scripts/render-readme-apngs.mjs
      - .github/workflows/render-profile-apng-assets.yml
      - README.md

concurrency:
  group: render-profile-apng-assets-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    name: Build APNG / ${{ matrix.asset }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        asset:
          - hero-banner
          - active-projects-card
          - section-divider

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install browser capture dependencies
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          npm install --no-save playwright
          npx playwright install --with-deps chromium

      - name: Build APNG asset
        run: node scripts/render-readme-apngs.mjs --asset "${{ matrix.asset }}" --out dist/profile-assets --clean --frames 36 --delay-ms 60

      - name: Validate generated PNG/APNG asset
        shell: bash
        run: |
          asset="dist/profile-assets/${{ matrix.asset }}.png"
          test -s "$asset"
          file "$asset"
          file "$asset" | grep -qi png

      - name: Upload APNG artifact
        uses: actions/upload-artifact@v4
        with:
          name: apng-${{ matrix.asset }}
          path: dist/profile-assets/${{ matrix.asset }}.png
          if-no-files-found: error

  publish:
    name: Publish APNG assets
    needs: build
    if: always() && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepare assets directory
        shell: bash
        run: |
          git pull --rebase --autostash origin "${GITHUB_REF_NAME:-main}"
          mkdir -p assets downloaded-assets

      - name: Download APNG artifacts
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          pattern: apng-*
          path: downloaded-assets
          merge-multiple: true

      - name: Copy generated APNGs into assets
        shell: bash
        run: |
          set -euo pipefail
          for asset in hero-banner active-projects-card section-divider; do
            if [[ -s "downloaded-assets/${asset}.png" ]]; then
              cp "downloaded-assets/${asset}.png" "assets/${asset}.png"
              echo "Published assets/${asset}.png"
            else
              echo "No successful artifact for ${asset}.png; leaving it unchanged."
            fi
          done

      - name: Commit APNG assets
        shell: bash
        run: |
          git add assets/hero-banner.png assets/active-projects-card.png assets/section-divider.png
          if [[ -n "$(git status --porcelain assets)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git commit -m "chore: publish APNG README assets [skip ci]"
            git push
          else
            echo "No APNG asset changes to commit."
          fi

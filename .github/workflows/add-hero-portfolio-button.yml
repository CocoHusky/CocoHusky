name: Add hero portfolio button

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/workflows/add-hero-portfolio-button.yml

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Add bottom-left orange portfolio button
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          path = Path('assets/hero-banner.svg')
          svg = path.read_text()

          if '.portfolio-button {' not in svg:
              svg = svg.replace('''  .body-copy {
    fill: #b6c2d4;
    font-size: 16px;
    font-weight: 450;
  }
]]></style>''', '''  .body-copy {
    fill: #b6c2d4;
    font-size: 16px;
    font-weight: 450;
  }

  .portfolio-button {
    fill: #e8834a;
    stroke: rgba(255, 178, 109, 0.42);
    stroke-width: 1;
  }

  .portfolio-button-glow {
    fill: #e8834a;
    opacity: 0.16;
  }

  .portfolio-button-text {
    fill: #010409;
    font-size: 14px;
    font-weight: 800;
    letter-spacing: 0.2px;
  }
]]></style>''')

          if 'class="portfolio-button"' not in svg:
              svg = svg.replace('''  <text class="body-copy" x="44" y="238">I turn early sensing concepts into wearable and implantable systems,</text>
  <text class="body-copy" x="44" y="263">bridging hardware, data, validation, and product translation.</text>
</g>''', '''  <text class="body-copy" x="44" y="238">I turn early sensing concepts into wearable and implantable systems,</text>
  <text class="body-copy" x="44" y="263">bridging hardware, data, validation, and product translation.</text>

  <g aria-label="View portfolio button">
    <rect class="portfolio-button-glow" x="44" y="296" width="158" height="40" rx="20"/>
    <rect class="portfolio-button" x="44" y="292" width="158" height="40" rx="20"/>
    <text class="portfolio-button-text" x="66" y="317">View portfolio →</text>
  </g>
</g>''')

          path.write_text(svg)
          PY

      - name: Validate SVG
        shell: bash
        run: |
          set -euo pipefail
          grep -q 'class="portfolio-button"' assets/hero-banner.svg
          grep -q 'View portfolio' assets/hero-banner.svg
          grep -q '<style><!\[CDATA\[' assets/hero-banner.svg
          grep -q '</svg>' assets/hero-banner.svg
          if grep -qi '<foreignObject' assets/hero-banner.svg; then
            echo "::error::foreignObject is not allowed"
            exit 1
          fi

      - name: Commit hero button
        shell: bash
        run: |
          set -euo pipefail
          git rm --ignore-unmatch .github/workflows/add-hero-portfolio-button.yml
          git add assets/hero-banner.svg
          if [[ -n "$(git status --porcelain)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git commit -m "style: add portfolio button to hero"
            git push
          else
            echo "No changes to commit."
          fi

name: Render profile SVG assets

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - assets-src/*.svg
      - config/svg-tokens.json
      - scripts/build-svg-assets.mjs
      - .github/workflows/render-profile-assets.yml
      - README.md
  pull_request:
    branches:
      - main
    paths:
      - assets-src/*.svg
      - config/svg-tokens.json
      - scripts/build-svg-assets.mjs
      - .github/workflows/render-profile-assets.yml
      - README.md

concurrency:
  group: render-profile-svg-assets-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  validate:
    name: Validate SVG sources
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Normalize hero title size
        shell: bash
        run: |
          node - <<'NODE'
          import { readFileSync, writeFileSync } from 'node:fs';
          const file = 'assets-src/hero-banner.svg';
          let svg = readFileSync(file, 'utf8');
          svg = svg.replace('font-size:43px', 'font-size:49px');
          svg = svg.replace('letter-spacing:-1.8px', 'letter-spacing:-2.1px');
          svg = svg.replace('y="96" class="heroTitle"', 'y="104" class="heroTitle"');
          svg = svg.replace('y="144" class="heroTitle"', 'y="158" class="heroTitle"');
          writeFileSync(file, svg);
          NODE

      - name: Build SVG assets for validation
        run: node scripts/build-svg-assets.mjs

      - name: Validate SVG sources and generated assets
        shell: bash
        run: |
          set -euo pipefail
          for file in assets-src/hero-banner.svg assets-src/active-projects-card.svg assets-src/section-divider.svg assets/hero-banner.svg assets/active-projects-card.svg assets/section-divider.svg; do
            test -s "$file"
            grep -q '<svg' "$file"
            grep -q '</svg>' "$file"
            grep -q 'xmlns="http://www.w3.org/2000/svg"' "$file"
            if grep -q '{{' "$file"; then
              echo "::error file=$file::Unresolved template token remains."
              exit 1
            fi
          done

  build:
    name: Build SVG assets
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Normalize hero title size
        shell: bash
        run: |
          node - <<'NODE'
          import { readFileSync, writeFileSync } from 'node:fs';
          const file = 'assets-src/hero-banner.svg';
          let svg = readFileSync(file, 'utf8');
          svg = svg.replace('font-size:43px', 'font-size:49px');
          svg = svg.replace('letter-spacing:-1.8px', 'letter-spacing:-2.1px');
          svg = svg.replace('y="96" class="heroTitle"', 'y="104" class="heroTitle"');
          svg = svg.replace('y="144" class="heroTitle"', 'y="158" class="heroTitle"');
          writeFileSync(file, svg);
          NODE

      - name: Build self-contained SVG assets
        run: node scripts/build-svg-assets.mjs

      - name: Upload built SVG assets
        uses: actions/upload-artifact@v4
        with:
          name: profile-svg-assets
          path: assets/*.svg
          if-no-files-found: error

  publish:
    name: Publish SVG assets
    needs: build
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download built SVG assets
        uses: actions/download-artifact@v4
        with:
          name: profile-svg-assets
          path: built-assets

      - name: Normalize source and publish generated SVGs
        shell: bash
        run: |
          set -euo pipefail
          node - <<'NODE'
          import { readFileSync, writeFileSync } from 'node:fs';
          const file = 'assets-src/hero-banner.svg';
          let svg = readFileSync(file, 'utf8');
          svg = svg.replace('font-size:43px', 'font-size:49px');
          svg = svg.replace('letter-spacing:-1.8px', 'letter-spacing:-2.1px');
          svg = svg.replace('y="96" class="heroTitle"', 'y="104" class="heroTitle"');
          svg = svg.replace('y="144" class="heroTitle"', 'y="158" class="heroTitle"');
          writeFileSync(file, svg);
          NODE
          mkdir -p assets
          cp built-assets/*.svg assets/
          for file in assets/hero-banner.svg assets/active-projects-card.svg assets/section-divider.svg; do
            test -s "$file"
            grep -q '<svg' "$file"
            grep -q '</svg>' "$file"
          done

      - name: Commit published SVG assets
        shell: bash
        run: |
          git add assets-src/hero-banner.svg assets/hero-banner.svg assets/active-projects-card.svg assets/section-divider.svg
          if [[ -n "$(git status --porcelain assets assets-src/hero-banner.svg)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git commit -m "chore: publish larger hero SVG assets [skip ci]"
            git push
          else
            echo "No generated SVG asset changes to commit."
          fi

name: Render profile README SVG

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - src/profile-card.html
      - scripts/render-readme-assets.mjs
      - package.json
      - .github/workflows/render-profile-assets.yml
      - README.md
  push:
    branches:
      - main
    paths:
      - src/profile-card.html
      - scripts/render-readme-assets.mjs
      - package.json
      - .github/workflows/render-profile-assets.yml

permissions:
  contents: write

jobs:
  render:
    name: Render HTML to SVG
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Render README SVG
        run: npm run render:readme-assets

      - name: Upload rendered SVG preview
        uses: actions/upload-artifact@v4
        with:
          name: profile-readme-svg
          path: assets/profile-card.svg

      - name: Commit generated SVG
        if: github.event_name != 'pull_request'
        shell: bash
        run: |
          if [[ -n "$(git status --porcelain assets/profile-card.svg assets/profile-card.png)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add assets/profile-card.svg
            git rm -f --ignore-unmatch assets/profile-card.png
            git commit -m "chore: render profile README SVG"
            git push
          else
            echo "No generated SVG changes to commit."
          fi

name: Validate and publish profile SVG assets

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'assets/*.svg'
      - '.github/workflows/render-profile-assets.yml'
      - 'README.md'
  pull_request:
    branches:
      - main
    paths:
      - 'assets/*.svg'
      - '.github/workflows/render-profile-assets.yml'
      - 'README.md'

concurrency:
  group: profile-svg-assets-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    name: Validate SVG assets and README references
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate expected SVG files
        shell: bash
        run: |
          set -euo pipefail

          expected_svg_assets=(
            "assets/hero-banner.svg"
            "assets/section-divider.svg"
            "assets/project-mmwave-vislog.svg"
            "assets/project-local-device-portal.svg"
            "assets/project-microserver-deployment.svg"
          )

          for file in "${expected_svg_assets[@]}"; do
            echo "Validating $file"

            if [[ ! -s "$file" ]]; then
              echo "::error file=$file::Expected SVG asset is missing or empty."
              exit 1
            fi

            grep -q '<svg' "$file" || {
              echo "::error file=$file::Missing opening <svg> tag."
              exit 1
            }

            grep -q '</svg>' "$file" || {
              echo "::error file=$file::Missing closing </svg> tag."
              exit 1
            }

            grep -q 'xmlns="http://www.w3.org/2000/svg"' "$file" || {
              echo "::error file=$file::Missing SVG XML namespace."
              exit 1
            }

            if grep -q '{{' "$file"; then
              echo "::error file=$file::Template token remains in final SVG."
              exit 1
            fi

            if grep -qi '<foreignObject' "$file"; then
              echo "::error file=$file::foreignObject is not allowed in README SVG assets."
              exit 1
            fi
          done

      - name: Validate README asset references and project links
        shell: bash
        run: |
          set -euo pipefail

          required_readme_refs=(
            './assets/hero-banner.svg'
            './assets/section-divider.svg'
            './assets/project-mmwave-vislog.svg'
            './assets/project-local-device-portal.svg'
            './assets/project-microserver-deployment.svg'
          )

          required_project_links=(
            'https://github.com/CocoHusky/mmWaveVizLog'
            'https://github.com/CocoHusky/local-device-portal'
            'https://github.com/CocoHusky/proxmox-homelab-guide'
          )

          for ref in "${required_readme_refs[@]}"; do
            grep -q "$ref" README.md || {
              echo "::error file=README.md::Missing required SVG reference: $ref"
              exit 1
            }
          done

          for link in "${required_project_links[@]}"; do
            grep -q "$link" README.md || {
              echo "::error file=README.md::Missing required project link: $link"
              exit 1
            }
          done

          stale_asset_refs=(
            './assets/active-projects-card.svg'
            './assets/hero-banner.png'
            './assets/section-divider.png'
            './assets/project-mmwave-vislog.png'
            './assets/project-local-device-portal.png'
            './assets/project-microserver-deployment.png'
          )

          for ref in "${stale_asset_refs[@]}"; do
            if grep -q "$ref" README.md; then
              echo "::error file=README.md::README still references stale generated asset: $ref"
              exit 1
            fi
          done

  artifacts:
    name: Publish organized SVG artifacts
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Stage SVG artifact files
        shell: bash
        run: |
          set -euo pipefail

          # Start clean every run so old/stale files cannot be republished.
          rm -rf profile-svg-assets
          mkdir -p profile-svg-assets/page-assets
          mkdir -p profile-svg-assets/project-cards

          cp assets/hero-banner.svg profile-svg-assets/page-assets/hero-banner.svg
          cp assets/section-divider.svg profile-svg-assets/page-assets/section-divider.svg
          cp assets/project-mmwave-vislog.svg profile-svg-assets/project-cards/project-mmwave-vislog.svg
          cp assets/project-local-device-portal.svg profile-svg-assets/project-cards/project-local-device-portal.svg
          cp assets/project-microserver-deployment.svg profile-svg-assets/project-cards/project-microserver-deployment.svg

          cat > profile-svg-assets/ASSET_MANIFEST.md <<'MANIFEST'
          # Profile SVG Assets

          | Asset | Source | Artifact path |
          |---|---|---|
          | Hero banner | `assets/hero-banner.svg` | `page-assets/hero-banner.svg` |
          | Section divider | `assets/section-divider.svg` | `page-assets/section-divider.svg` |
          | 60 GHz mmWave VisLog card | `assets/project-mmwave-vislog.svg` | `project-cards/project-mmwave-vislog.svg` |
          | mDNS Device Portal card | `assets/project-local-device-portal.svg` | `project-cards/project-local-device-portal.svg` |
          | Local AI Server card | `assets/project-microserver-deployment.svg` | `project-cards/project-microserver-deployment.svg` |
          MANIFEST

      - name: Write Actions summary
        shell: bash
        run: |
          set -euo pipefail
          {
            echo "## Published SVG assets"
            echo
            echo "| Asset | Source file | Artifact name |"
            echo "|---|---|---|"
            echo "| Hero banner | assets/hero-banner.svg | profile-hero-banner |"
            echo "| Section divider | assets/section-divider.svg | profile-section-divider |"
            echo "| 60 GHz mmWave VisLog | assets/project-mmwave-vislog.svg | project-mmwave-vislog |"
            echo "| mDNS Device Portal | assets/project-local-device-portal.svg | project-local-device-portal |"
            echo "| Local AI Server | assets/project-microserver-deployment.svg | project-microserver-deployment |"
            echo
            echo "A bundled artifact named profile-svg-assets-all is uploaded with every SVG plus ASSET_MANIFEST.md."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload all SVG assets bundle
        uses: actions/upload-artifact@v4
        with:
          name: profile-svg-assets-all
          path: profile-svg-assets/**
          if-no-files-found: error

      - name: Upload hero banner artifact
        uses: actions/upload-artifact@v4
        with:
          name: profile-hero-banner
          path: profile-svg-assets/page-assets/hero-banner.svg
          if-no-files-found: error

      - name: Upload section divider artifact
        uses: actions/upload-artifact@v4
        with:
          name: profile-section-divider
          path: profile-svg-assets/page-assets/section-divider.svg
          if-no-files-found: error

      - name: Upload mmWave project card artifact
        uses: actions/upload-artifact@v4
        with:
          name: project-mmwave-vislog
          path: profile-svg-assets/project-cards/project-mmwave-vislog.svg
          if-no-files-found: error

      - name: Upload mDNS Device Portal card artifact
        uses: actions/upload-artifact@v4
        with:
          name: project-local-device-portal
          path: profile-svg-assets/project-cards/project-local-device-portal.svg
          if-no-files-found: error

      - name: Upload Local AI Server card artifact
        uses: actions/upload-artifact@v4
        with:
          name: project-microserver-deployment
          path: profile-svg-assets/project-cards/project-microserver-deployment.svg
          if-no-files-found: error

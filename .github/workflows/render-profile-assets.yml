name: Render profile SVG assets

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - assets-src/*.svg
      - config/svg-tokens.json
      - scripts/build-svg-assets.mjs
      - .github/workflows/render-profile-assets.yml
      - README.md
  pull_request:
    branches:
      - main
    paths:
      - assets-src/*.svg
      - config/svg-tokens.json
      - scripts/build-svg-assets.mjs
      - .github/workflows/render-profile-assets.yml
      - README.md

concurrency:
  group: render-profile-svg-assets-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    name: Build SVG assets
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build self-contained SVG assets
        run: node scripts/build-svg-assets.mjs

      - name: Validate generated SVG assets
        shell: bash
        run: |
          set -euo pipefail
          for file in assets/hero-banner.svg assets/active-projects-card.svg assets/section-divider.svg; do
            test -s "$file"
            grep -q '<svg' "$file"
            grep -q '</svg>' "$file"
            grep -q 'xmlns="http://www.w3.org/2000/svg"' "$file"
            if grep -q '{{' "$file"; then
              echo "::error file=$file::Unresolved template token remains."
              exit 1
            fi
          done

      - name: Commit generated SVG assets
        if: github.event_name != 'pull_request'
        shell: bash
        run: |
          git add assets/hero-banner.svg assets/active-projects-card.svg assets/section-divider.svg
          if [[ -n "$(git status --porcelain assets)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git commit -m "chore: publish SVG README assets [skip ci]"
            git push
          else
            echo "No generated SVG asset changes to commit."
          fi

name: Validate profile SVG assets

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - assets/*.svg
      - .github/workflows/render-profile-assets.yml
      - README.md
  pull_request:
    branches:
      - main
    paths:
      - assets/*.svg
      - .github/workflows/render-profile-assets.yml
      - README.md

concurrency:
  group: validate-profile-svg-assets-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  validate:
    name: Validate SVG assets
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate SVG files
        shell: bash
        run: |
          set -euo pipefail
          for file in assets/hero-banner.svg assets/active-projects-card.svg assets/section-divider.svg; do
            test -s "$file"
            grep -q '<svg' "$file"
            grep -q '</svg>' "$file"
            grep -q 'xmlns="http://www.w3.org/2000/svg"' "$file"
            if grep -q '{{' "$file"; then
              echo "::error file=$file::Template token remains in final SVG."
              exit 1
            fi
            if grep -qi '<foreignObject' "$file"; then
              echo "::error file=$file::foreignObject is not allowed in README SVG assets."
              exit 1
            fi
          done

  build:
    name: Build SVG artifact
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Stage SVG artifact files
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p profile-svg-assets
          cp assets/hero-banner.svg profile-svg-assets/
          cp assets/active-projects-card.svg profile-svg-assets/
          cp assets/section-divider.svg profile-svg-assets/

      - name: Upload SVG artifacts
        uses: actions/upload-artifact@v4
        with:
          name: profile-svg-assets
          path: profile-svg-assets/*.svg
          if-no-files-found: error

  publish:
    name: Publish check
    needs: build
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Confirm README uses SVG assets
        shell: bash
        run: |
          set -euo pipefail
          grep -q './assets/hero-banner.svg' README.md
          grep -q './assets/active-projects-card.svg' README.md
          grep -q './assets/section-divider.svg' README.md
          if grep -q './assets/.*\.png' README.md || grep -q './assets/.*\.gif' README.md; then
            echo "::error file=README.md::README should only reference SVG profile assets."
            exit 1
          fi

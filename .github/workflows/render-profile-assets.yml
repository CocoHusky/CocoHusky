name: Render profile README assets

on:
  workflow_dispatch:
  schedule:
    - cron: "17 9 * * *"
  pull_request:
    branches:
      - main
    paths:
      - assets-src/**
      - scripts/render-readme-assets.mjs
      - package.json
      - .github/workflows/render-profile-assets.yml
  push:
    branches:
      - main
    paths:
      - assets-src/**
      - scripts/render-readme-assets.mjs
      - package.json
      - .github/workflows/render-profile-assets.yml

concurrency:
  group: render-profile-readme-assets-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    name: Build / ${{ matrix.asset }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        asset:
          - hero-banner
          - active-projects-card
          - section-divider

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install browser renderer for uploaded hero HTML
        if: matrix.asset == 'hero-banner'
        run: |
          npm install --no-save playwright
          npx playwright install --with-deps chromium

      - name: Build SVG from HTML source
        run: npm run build:profile-asset -- --asset "${{ matrix.asset }}" --out dist/profile-assets

      - name: Upload built SVG
        uses: actions/upload-artifact@v4
        with:
          name: svg-${{ matrix.asset }}
          path: dist/profile-assets/${{ matrix.asset }}.svg
          if-no-files-found: error

  test:
    name: Test / ${{ matrix.asset }}
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        asset:
          - hero-banner
          - active-projects-card
          - section-divider

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install browser renderer for uploaded hero HTML
        if: matrix.asset == 'hero-banner'
        run: |
          npm install --no-save playwright
          npx playwright install --with-deps chromium

      - name: Download built SVG
        uses: actions/download-artifact@v4
        with:
          name: svg-${{ matrix.asset }}
          path: dist/profile-assets

      - name: Validate HTML source
        run: npm run test:profile-asset -- --asset "${{ matrix.asset }}"

      - name: Validate generated SVG artifact
        shell: bash
        run: |
          test -s "dist/profile-assets/${{ matrix.asset }}.svg"
          grep -q '<svg ' "dist/profile-assets/${{ matrix.asset }}.svg"
          grep -q '</svg>' "dist/profile-assets/${{ matrix.asset }}.svg"
          if [[ "${{ matrix.asset }}" == "hero-banner" ]]; then
            grep -q '<image ' "dist/profile-assets/${{ matrix.asset }}.svg"
          fi
          if [[ "${{ matrix.asset }}" == "active-projects-card" ]]; then
            grep -q '<text ' "dist/profile-assets/${{ matrix.asset }}.svg"
          fi
          if grep -q '<foreignObject ' "dist/profile-assets/${{ matrix.asset }}.svg"; then
            echo "Generated SVG must not use foreignObject."
            exit 1
          fi

  publish:
    name: Publish generated SVG assets
    needs: test
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all built SVGs
        uses: actions/download-artifact@v4
        with:
          pattern: svg-*
          path: assets
          merge-multiple: true

      - name: Commit generated SVG assets
        shell: bash
        run: |
          git rm -f --ignore-unmatch assets/profile-card.svg assets/profile-card.png assets/github-stats-card.svg assets/activity-card.svg assets/cta-portfolio.svg assets/cta-linkedin.svg assets/cta-scholar.svg
          if [[ -n "$(git status --porcelain assets)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git pull --rebase --autostash origin "${GITHUB_REF_NAME:-main}"
            git add assets/hero-banner.svg assets/active-projects-card.svg assets/section-divider.svg
            git commit -m "chore: publish generated profile SVG assets [skip ci]"
            git push
          else
            echo "No generated SVG asset changes to commit."
          fi

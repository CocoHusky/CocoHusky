name: Render profile README assets

on:
  workflow_dispatch:
  schedule:
    - cron: "17 9 * * *"
  pull_request:
    branches:
      - main
    paths:
      - assets-src/**
      - scripts/render-readme-assets.mjs
      - package.json
      - package-lock.json
      - .github/workflows/render-profile-assets.yml
      - README.md
  push:
    branches:
      - main
    paths:
      - assets-src/**
      - scripts/render-readme-assets.mjs
      - package.json
      - package-lock.json
      - .github/workflows/render-profile-assets.yml
      - README.md

concurrency:
  group: render-profile-readme-assets-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  asset-check:
    name: Check / ${{ matrix.asset }}
    runs-on: ubuntu-latest
    timeout-minutes: 3
    strategy:
      fail-fast: false
      matrix:
        asset:
          - hero-banner
          - active-projects-card
          - section-divider

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Check source shape
        shell: bash
        run: |
          set -euo pipefail
          file="assets-src/${{ matrix.asset }}.html"
          test -s "$file" || { echo "::error file=$file::Missing source file."; exit 1; }

          echo "Checking $file"

          if grep -qi "id=\"readme-asset\"" "$file"; then
            grep -qi "xmlns=\"http://www.w3.org/2000/svg\"" "$file" || { echo "::error file=$file::SVG source missing xmlns."; exit 1; }
            grep -qi "viewBox=" "$file" || { echo "::error file=$file::SVG source missing viewBox."; exit 1; }
            grep -Eqi "width=\"[0-9]+" "$file" || { echo "::error file=$file::SVG source missing numeric width."; exit 1; }
            grep -Eqi "height=\"[0-9]+" "$file" || { echo "::error file=$file::SVG source missing numeric height."; exit 1; }
            echo "SVG-native source shape OK."
          else
            grep -Eqi "data-width=\"[0-9]+" "$file" || { echo "::error file=$file::Legacy source missing data-width."; exit 1; }
            grep -Eqi "data-height=\"[0-9]+" "$file" || { echo "::error file=$file::Legacy source missing data-height."; exit 1; }
            echo "Legacy HTML source shape OK."
          fi

  build:
    name: Build / ${{ matrix.asset }}
    needs: asset-check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        asset:
          - hero-banner
          - active-projects-card
          - section-divider

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Validate HTML source
        run: npm run test:profile-asset -- --asset "${{ matrix.asset }}"

      - name: Build SVG asset
        run: npm run build:profile-asset -- --asset "${{ matrix.asset }}" --out dist/profile-assets --clean

      - name: Validate generated SVG asset
        shell: bash
        run: |
          set -euo pipefail
          svg="dist/profile-assets/${{ matrix.asset }}.svg"
          test -s "$svg"
          grep -q "<svg " "$svg"
          grep -q "</svg>" "$svg"
          grep -q "xmlns=\"http://www.w3.org/2000/svg\"" "$svg"
          grep -q "viewBox=" "$svg"

          case "${{ matrix.asset }}" in
            hero-banner)
              grep -q "Medical sensor systems" "$svg"
              ;;
            active-projects-card)
              grep -q "60 GHz mmWave Radar" "$svg"
              grep -q "Professional Profile" "$svg"
              ;;
            section-divider)
              grep -q "divider-line" "$svg"
              grep -q "divider-dot" "$svg"
              ;;
          esac

      - name: Upload built SVG
        uses: actions/upload-artifact@v4
        with:
          name: svg-${{ matrix.asset }}
          path: dist/profile-assets/${{ matrix.asset }}.svg
          if-no-files-found: error

  publish:
    name: Publish generated SVG assets
    needs: build
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepare assets directory
        shell: bash
        run: |
          git pull --rebase --autostash origin "${GITHUB_REF_NAME:-main}"
          mkdir -p assets
          rm -f assets/hero-banner.svg assets/active-projects-card.svg assets/section-divider.svg
          git rm -f --ignore-unmatch \
            assets/profile-card.svg \
            assets/profile-card.png \
            assets/github-stats-card.svg \
            assets/activity-card.svg \
            assets/cta-portfolio.svg \
            assets/cta-linkedin.svg \
            assets/cta-scholar.svg

      - name: Download all built SVGs
        uses: actions/download-artifact@v4
        with:
          pattern: svg-*
          path: assets
          merge-multiple: true

      - name: Commit generated SVG assets
        shell: bash
        run: |
          git add assets/hero-banner.svg assets/active-projects-card.svg assets/section-divider.svg
          if [[ -n "$(git status --porcelain assets)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git commit -m "chore: publish generated profile SVG assets [skip ci]"
            git push
          else
            echo "No generated SVG asset changes to commit."
          fi

name: Render profile README SVG

on:
  workflow_dispatch:
  schedule:
    - cron: '17 7 * * *'
  pull_request:
    branches:
      - main
    paths:
      - src/profile-card.html
      - src/profile-card-data.json
      - scripts/render-readme-assets.mjs
      - package.json
      - .github/workflows/render-profile-assets.yml
      - README.md
  push:
    branches:
      - main
    paths:
      - src/profile-card.html
      - src/profile-card-data.json
      - scripts/render-readme-assets.mjs
      - package.json
      - .github/workflows/render-profile-assets.yml

concurrency:
  group: render-profile-readme-svg-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  render:
    name: Render dynamic profile SVG
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Render README SVG
        run: npm run render:readme-assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload rendered SVG preview
        uses: actions/upload-artifact@v4
        with:
          name: profile-readme-svg
          path: assets/profile-card.svg

      - name: Commit generated SVG
        if: github.event_name != 'pull_request'
        shell: bash
        run: |
          if [[ -n "$(git status --porcelain assets/profile-card.svg assets/profile-card.png)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git pull --rebase --autostash origin "${GITHUB_REF_NAME:-main}"
            git add assets/profile-card.svg
            git rm -f --ignore-unmatch assets/profile-card.png
            git commit -m "chore: render dynamic profile README SVG"
            git push
          else
            echo "No generated SVG changes to commit."
          fi

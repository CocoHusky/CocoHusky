name: Render profile README assets

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - src/profile-card.html
      - scripts/render-readme-assets.mjs
      - package.json
      - .github/workflows/render-profile-assets.yml

permissions:
  contents: write

jobs:
  render:
    name: Render HTML to PNG and SVG
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install --no-package-lock

      - name: Install Chromium for Playwright
        run: npx playwright install --with-deps chromium

      - name: Render README assets
        run: npm run render:readme-assets

      - name: Commit generated assets
        shell: bash
        run: |
          if [[ -n "$(git status --porcelain assets/profile-card.png assets/profile-card.svg)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add assets/profile-card.png assets/profile-card.svg
            git commit -m "chore: render profile README assets"
            git push
          else
            echo "No generated asset changes to commit."
          fi

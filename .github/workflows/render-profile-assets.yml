name: Render profile README assets

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - assets-src/**
      - scripts/render-readme-assets.mjs
      - package.json
      - .github/workflows/render-profile-assets.yml
  push:
    branches:
      - main
    paths:
      - assets-src/**
      - scripts/render-readme-assets.mjs
      - package.json
      - .github/workflows/render-profile-assets.yml

concurrency:
  group: render-profile-readme-assets-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  render:
    name: Render profile README assets
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Render README assets from HTML sources
        run: npm run render:readme-assets

      - name: Upload rendered asset preview
        uses: actions/upload-artifact@v4
        with:
          name: profile-readme-assets
          path: |
            assets/hero-banner.svg
            assets/section-divider.svg
            assets/active-projects-card.svg

      - name: Commit generated assets
        if: github.event_name != 'pull_request'
        shell: bash
        run: |
          if [[ -n "$(git status --porcelain assets)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git pull --rebase --autostash origin "${GITHUB_REF_NAME:-main}"
            git add assets/hero-banner.svg assets/section-divider.svg assets/active-projects-card.svg
            git rm -f --ignore-unmatch assets/profile-card.svg assets/profile-card.png assets/github-stats-card.svg assets/activity-card.svg assets/cta-portfolio.svg assets/cta-linkedin.svg assets/cta-scholar.svg
            git commit -m "chore: render profile README assets [skip ci]"
            git push
          else
            echo "No generated asset changes to commit."
          fi

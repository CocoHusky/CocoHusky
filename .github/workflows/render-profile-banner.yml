name: Render profile banner

on:
  push:
    branches: [main]
    paths:
      - assets/profile-banner.html
      - scripts/render-profile-banner.mjs
      - .github/workflows/render-profile-banner.yml
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: profile-banner-${{ github.ref }}
  cancel-in-progress: true

jobs:
  render-banner:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Render banner SVG from editable HTML
        run: node scripts/render-profile-banner.mjs

      - name: Commit rendered banner SVG
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Render profile banner SVG from HTML
          file_pattern: assets/profile-banner.svg

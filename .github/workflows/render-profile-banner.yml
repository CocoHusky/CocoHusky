name: Render profile banner

on:
  push:
    branches: [main]
    paths:
      - assets/profile-banner.html
      - scripts/render-profile-banner.mjs
      - .github/workflows/render-profile-banner.yml
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: profile-banner-${{ github.ref }}
  cancel-in-progress: true

jobs:
  render-banner:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Playwright
        run: |
          npm install --no-save playwright
          npx playwright install --with-deps chromium

      - name: Render real PNG banner from editable HTML
        run: node scripts/render-profile-banner.mjs

      - name: Commit generated image and README
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Render profile banner PNG from HTML
          file_pattern: |
            assets/profile-banner.png
            assets/profile-banner.svg
            README.md
          status_options: --short

name: Render profile banner

on:
  push:
    branches: [main]
    paths:
      - assets/profile-banner.html
      - scripts/render-profile-banner.mjs
      - .github/workflows/render-profile-banner.yml
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: profile-banner-${{ github.ref }}
  cancel-in-progress: true

jobs:
  render-banner:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Playwright
        run: |
          npm install --no-save playwright
          npx playwright install --with-deps chromium

      - name: Render real PNG banner from editable HTML
        run: node scripts/render-profile-banner.mjs

      - name: Commit generated image and README
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -A assets/profile-banner.png assets/profile-banner.svg README.md

          if git diff --cached --quiet; then
            echo "No rendered banner changes to commit."
            exit 0
          fi

          git commit -m "Render profile banner PNG from HTML"
          git pull --rebase origin main
          git push origin HEAD:main

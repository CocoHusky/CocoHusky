name: Restore requested SVG bases

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/workflows/restore-requested-svg-bases.yml

permissions:
  contents: write

jobs:
  restore:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check out full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Restore exact requested SVG bases
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p assets-src assets
          git show e707092:assets/hero-banner.svg > assets-src/hero-banner.svg
          git show e707092:assets/hero-banner.svg > assets/hero-banner.svg
          git show 5b35da1:assets/section-divider.svg > assets-src/section-divider.svg
          git show 5b35da1:assets/section-divider.svg > assets/section-divider.svg
          node scripts/build-svg-assets.mjs

      - name: Commit restored SVG bases
        shell: bash
        run: |
          git add assets-src/hero-banner.svg assets-src/section-divider.svg assets/hero-banner.svg assets/section-divider.svg assets/active-projects-card.svg
          if [[ -n "$(git status --porcelain)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git commit -m "chore: restore requested SVG bases [skip ci]"
            git push
          else
            echo "No SVG base changes to commit."
          fi
